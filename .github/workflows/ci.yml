name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build & validate content
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Corre prebuild → build:content, que valida el frontmatter de cada
      # lección y falla si una referencia en course.json no existe.
      - name: Build (tsc + vite + content)
        run: npm run build
        env:
          VITE_SERVER_URL: ${{ secrets.SERVER_URL || vars.SERVER_URL }}
