                    <!--?lit$879552982$--><p>You've already learned about one function which serves to output data – but can you remember its name? Yes, it’s the <codel>puts</codel> function, and we used it in the very first program we wrote in the “C” language. The <codel>puts</codel> function's capabilities aren't really all that stunning – it can write a string on a computer screen and nothing else. You mustn’t use it if you want to print an integer value or a single character.</p>

<p>Why? Because of impairment of the <codel>puts</codel> function. Its argument can only be a <b>string</b> (more precisely – data of type <codel>char *</codel>; but don't be confused by this; we’re going to tell you more about it soon). No other parameters will be accepted, so the compiler will be unrelenting and it will not compile such a program.</p>

<p>So what should we do if we wish to output a value of type <codel>int</codel> or float or <codel>char</codel>?</p>

                            <div class="before-body-text" tabindex="0">
                            <!--?lit$879552982$--><p>To accomplish these, and even more complex, tasks, there’s a very powerful function in the “C” language named <codel>printf</codel> (<b>print formatted</b>). This function can easily output several values of different types and mix them with the text. We can’t show you all of its capabilities now because, firstly, there are many, and secondly, we still lack some theoretical foundations to understand many of them.</p>

<p>The <codel>printf</codel> function has several unique features: it doesn’t specify how many arguments must be provided; the only requirement is that there must be at least one argument; additionally, only the first argument has a strict type (it must be a string); all subsequent arguments may be of any type. It isn’t sorcery. The “C” language enables us to write these functions ourselves.</p>

<p>The first, mandatory, argument is called the <b>format</b>. It’s a recipe or a specification according to which the <codel>printf</codel> function will proceed with its subsequent arguments.</p>

<p><codel>printf</codel> reads the instruction carefully and learns from it which data is to be printed and how it should be presented to the user. Let's look at it in a few applications. The first is simple – we tell <codel>printf</codel> to print some text. We do it like this:</p>

<br>

                        <!--?lit$879552982$-->

                            <div class="before-body-text" tabindex="0">
                            <!--?lit$879552982$--><p>See, now the <codel>printf</codel> function is invoked with two arguments. The first is the format. The second is a variable of type <codel>int</codel>. Take a look at the format – there’s a suspicious character there: <codel>%</codel>. What is this mysterious percent intended for?</p>

<p>If there’s a percent symbol inside the format, the <codel>printf</codel> considers it a <b>hint on how to proceed</b> with the arguments following the format. The first hint refers to the first argument after the format, the second to the second, etc. (but there are some exceptions to this simple rule).</p>

<p>The <codel>%</codel> joined together with some other character(s) is sometimes called a <b>specifier</b>. In the example here below the format contains one specifier: <codel>%d</codel>:</p>

<br>
                            </div>
                        
                        <div class="code__wrapper ">
                        <!--?lit$879552982$-->
                            <button class="button-copy" aria-label="undefined">
                  <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="copy" class="svg-inline--fa fa-copy fa-w-14" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
                    <path fill="currentColor" d="M320 448v40c0 13.255-10.745 24-24 24H24c-13.255 0-24-10.745-24-24V120c0-13.255 10.745-24 24-24h72v296c0 30.879 25.121 56 56 56h168zm0-344V0H152c-13.255 0-24 10.745-24 24v368c0 13.255 10.745 24 24 24h272c13.255 0 24-10.745 24-24V128H344c-13.2 0-24-10.8-24-24zm120.971-31.029L375.029 7.029A24 24 0 0 0 358.059 0H352v96h96v-6.059a24 24 0 0 0-7.029-16.97z"></path>
                  </svg>
                </button><pre class="language-c " data-line=""><code><span class="token function">printf</span><span class="token punctuation">(</span><span class="token string">"Sheep counted so far: %d"</span><span class="token punctuation">,</span> SheepCounter<span class="token punctuation">)</span><span class="token punctuation">;</span></code></pre>
                        </div>
                        <!--?lit$879552982$-->
                            <div class="after-body-text" tabindex="0">
                                <!--?lit$879552982$--><br>

<p>The letter <codel>d</codel> indicates that the corresponding argument should be treated as a value of type <codel>int</codel> and sent to the screen as a number. </p>

<p>Let’s have a look at an abbreviated list of specifiers now. The complete list is much more exhaustive, while the general form of the specifier is far more complex and gives more opportunities to deal with the look and shape of the data presented.</p>


<ul>
<li><codel>%d</codel> (as in <b>d</b>ecimal) specifies that the corresponding argument is a <b>value of type <codel>int</codel></b> and should be presented as a fixed-point decimal number; its synonym is a <codel>%i</codel> specifier (as in <b>i</b>nteger).</li><br>

<li><codel>%x</codel> (as in he<b>x</b>adecimal) specifies that the corresponding argument is a value of type <codel>int</codel> and should be presented as a fixed-point <b>hexadecimal number</b>.</li><br>

<li><codel>%o</codel> (as in <b>o</b>ctal) specifies that the corresponding argument is a value of type <codel>int</codel> and should be presented as a fixed-point <b>octal</b> number.</li><br>

<li><codel>%c</codel> (as in <b>c</b>har) specifies that the corresponding argument is a value of type <codel>int</codel> or <codel>char</codel> and should be presented as a <b>character</b>.</li><br>

<li><codel>%f</codel> (as in <b>f</b>loat) specifies that the corresponding argument is a value of type <codel>float</codel> and should be presented as a <b>single-precision floating-point number</b>.</li><br>

<li><codel>%lf</codel> specifies that the corresponding argument is a value of type <codel>double</codel>  and should be presented as a <b>double-precision floating-point number</b>.</li>
</ul>

<p>Note: Do you remember the difference between a <codel>float</codel> and a <codel>double</codel>? You probably remember that the main difference is precision: a <codel>double</codel> is <i>double</i> the size of a <codel>float</codel> (the size of <codel>float</codel> is 4 bytes, while the size of <codel>double</codel> is 8 bytes), which means <codel>double</codel> has higher precision than <codel>float</codel>, but it also takes up more memory and is slower.</p>


<p>You may ask how to display the percent sign itself if this character is treated as the start of a specifier. The answer is perhaps not all that obvious: in this case, you need to write two percent signs side by side (but only one will be displayed). We can also consider it to be a specifier, so let's add it to our list:</p>

<ul>
<li><codel>%%</codel> (as in <i>itself</i>) specifies the <b>percent sign</b>.</li>
</ul>

                                <!--?lit$879552982$--><div tabindex="0" class="afterHtml"><!--?lit$879552982$--><br>

<p>The <codel>printf</codel> function performs the following work for us:</p>

<ul>
<li><b>analyses</b> the format and when it doesn’t encounter any specifiers, puts the string <codel>The year is </codel> on the screen;</li>
<li>at this point, <codel>printf</codel> <b>encounters a specifier</b> and learns from it that there’s an <codel>int</codel> which should be displayed as a decimal number; it retrieves the first argument after the format (the variable <codel>VarInt</codel>) and the screen shows the number <codel>2012</codel>;</li>
<li><codel>printf</codel> resumes from reviewing the format and displays the string <codel>The radius is denoted as</codel>;</li>
<li>next, another <b>specifier is met</b>; this time one which demands the program to display the value of type <codel>char</codel> as a single character; the character is taken from the second argument after the format (<codel>VarChar</codel>) and the character <codel>r</codel> is displayed;</li>
<li><codel>printf</codel> resumes from reviewing the format and displays the string <codel>while PI is equal to </codel>;</li>
<li>the next (and last) specifier <b>requires it to display a <codel>float</codel> value</b>, which is taken from the third argument after the format (<codel>VarFloat</codel>).</li>
</ul></div>

                            <!--?lit$879552982$--><p>Let’s now try to think what mistakes we can make here and what their consequences might be. We’ll show you some typical errors.</p>

<ul>
<li>
<b>Mistake #1</b>: there are <b>more format specifiers than arguments</b>, e.g.:
</li>
</ul>

<br>
                            </div>

                  </svg>
                </button><pre class="language-c " data-line=""><code><span class="token function">printf</span><span class="token punctuation">(</span><span class="token string">"%d %d %d"</span><span class="token punctuation">,</span> i<span class="token punctuation">,</span> j<span class="token punctuation">)</span><span class="token punctuation">;</span></code></pre>
                        </div>
                        <!--?lit$879552982$-->
                            <div class="after-body-text" tabindex="0">
                                <!--?lit$879552982$--><br>

<p>There are three specifiers but only two arguments – the last specifier is <b>missing</b> its argument. If your compiler is clever enough, it’ll pay attention to this (most modern compilers do). However, if your compiler is rather clumsy, you won’t get a warning and when you start the program the value printed for the orphaned specifier will be completely <b>random</b>.</p>

                            <!--?lit$879552982$--><ul>
<li><b>Mistake #3</b>: the <b>type announced by the specifier is different from the type of the corresponding argument</b>.</li>
</ul>

<br>

                        <div class="code__wrapper ">

                            <button class="button-copy" aria-label="undefined">

                  </svg>
                </button><pre class="language-c " data-line=""><code><span class="token keyword">int</span> i<span class="token punctuation">;</span>
i <span class="token operator">=</span> <span class="token number">100</span><span class="token punctuation">;</span>
<span class="token function">printf</span><span class="token punctuation">(</span><span class="token string">"%f"</span><span class="token punctuation">,</span> i<span class="token punctuation">)</span><span class="token punctuation">;</span></code></pre>
                        </div>
                        <!--?lit$879552982$-->
                            <div class="after-body-text" tabindex="0">
                                <!--?lit$879552982$--><br>

<p>The specifier requires a <codel>float</codel> but you’ve provided a variable of type <codel>int</codel>. If the compiler doesn’t notice, the value that will be printed on the screen at run time will really surprise you. It’ll have little to do with the actual value of the variable <codel>i</codel>, which is associated with a different representation of the <codel>int</codel> and <codel>float</codel> data in the computer memory.</p>

</ul>

                  </svg>
                </button><pre class="language-c " data-line=""><code><span class="token keyword">char</span> c<span class="token punctuation">;</span>

                        <!--?lit$879552982$-->
                            <div class="before-body-text" tabindex="0">
                            <!--?lit$879552982$--><p>Of course, as equally important as data output is data <b>input</b>. Actually, it’s difficult to imagine any complex program that does not require any data from the user, although you could do in this carefree way:</p>

<ul>
<li>encode all the data needed inside the source code (which is sometimes called <b>hard coding</b>);</li>
<li>when you need to repeat the execution of the program with other data you just modify the program, compile it and run it again.</li>
</ul>

<p>This is not a particularly convenient solution. It’s far better to get information from the user, transfer it to the program, and then use it for calculations. How can the “C” language program get any data from a human and store it in variables? As in most cases, if you need to perform some complex operations, you should begin a search for the function that performs this task, and only if such a function doesn’t exist should you write it on your own.</p>

<p>In this case however, we’re lucky – the function used for data input already exists and is easily available.</p>

<p>The function is named <codel>scanf</codel> (<b>scan formatted</b>) and is a close relative of the printf function. Where did this relationship come from? You'll see soon.</p>

<p>Imagine that we want to ask the user about the maximum number of sheep that we want to count before the developer falls asleep. The user enters the value from the keyboard and the program stores it in a specified variable (<codel>MaxSheep</codel>). An appropriate <i>scanf</i> invocation looks as follows:</p>

<br>
                            </div>
                        
                        <div class="code__wrapper ">
                        <!--?lit$879552982$-->
                            <button class="button-copy" aria-label="undefined">
                  <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="copy" class="svg-inline--fa fa-copy fa-w-14" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">

                  </svg>
                </button><pre class="language-c " data-line=""><code><span class="token function">scanf</span><span class="token punctuation">(</span><span class="token string">"%d"</span><span class="token punctuation">,</span> <span class="token operator">&amp;</span>amp<span class="token punctuation">;</span>MaxSheep<span class="token punctuation">)</span><span class="token punctuation">;</span></code></pre>

                            <div class="before-body-text" tabindex="0">
                            <!--?lit$879552982$--><p>Perhaps you see the similarity to the <codel>printf</codel>. The first parameter is also a <b>format</b> that tells the function which data will be given to the program, and in which form. As before, we give arguments for the format in the amount equal to the number of the given specifiers. At this point, the similarities end and the differences begin. First, the argument for the print may not be a variable. It may be an expression as well. Take a look:</p>

<br>
                            </div>
                        
                        <div class="code__wrapper ">
                        <!--?lit$879552982$-->
                            <button class="button-copy" aria-label="undefined">
                  <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="copy" class="svg-inline--fa fa-copy fa-w-14" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
                    <path fill="currentColor" d="M320 448v40c0 13.255-10.745 24-24 24H24c-13.255 0-24-10.745-24-24V120c0-13.255 10.745-24 24-24h72v296c0 30.879 25.121 56 56 56h168zm0-344V0H152c-13.255 0-24 10.745-24 24v368c0 13.255 10.745 24 24 24h272c13.255 0 24-10.745 24-24V128H344c-13.2 0-24-10.8-24-24zm120.971-31.029L375.029 7.029A24 24 0 0 0 358.059 0H352v96h96v-6.059a24 24 0 0 0-7.029-16.97z"></path>
                  </svg>
                </button><pre class="language-c " data-line=""><code><span class="token function">printf</span><span class="token punctuation">(</span><span class="token string">"%d"</span><span class="token punctuation">,</span> <span class="token number">2</span> <span class="token operator">*</span> i<span class="token punctuation">)</span><span class="token punctuation">;</span></code></pre>
                        </div>
                        <!--?lit$879552982$-->
                            <div class="after-body-text" tabindex="0">
                                <!--?lit$879552982$--><br>

<p>Here we’d like to print the doubled value of <codel>i</codel> – this is feasible. Using the <codel>scanf</codel> specifier, we must <b>explicitly specify the variable</b> that is able to store the data entered by the user. This, however, is not the end of the differences.</p>

                            </div>

                            <div class="before-body-text" tabindex="0">
                            <!--?lit$879552982$--><p>Look at the <i>scanf</i> function invocation once again:</p>

<br>
                            </div>
                        
                        <div class="code__wrapper ">
                        <!--?lit$879552982$-->
                            <button class="button-copy" aria-label="undefined">
                  <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="copy" class="svg-inline--fa fa-copy fa-w-14" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
                    <path fill="currentColor" d="M320 448v40c0 13.255-10.745 24-24 24H24c-13.255 0-24-10.745-24-24V120c0-13.255 10.745-24 24-24h72v296c0 30.879 25.121 56 56 56h168zm0-344V0H152c-13.255 0-24 10.745-24 24v368c0 13.255 10.745 24 24 24h272c13.255 0 24-10.745 24-24V128H344c-13.2 0-24-10.8-24-24zm120.971-31.029L375.029 7.029A24 24 0 0 0 358.059 0H352v96h96v-6.059a24 24 0 0 0-7.029-16.97z"></path>
                  </svg>
                </button><pre class="language-c " data-line=""><code><span class="token function">scanf</span><span class="token punctuation">(</span><span class="token string">"%d"</span><span class="token punctuation">,</span> <span class="token operator">&amp;</span>amp<span class="token punctuation">;</span>MaxSheep<span class="token punctuation">)</span><span class="token punctuation">;</span></code></pre>
                        </div>
                        <!--?lit$879552982$-->
                            <div class="after-body-text" tabindex="0">
                                <!--?lit$879552982$--><br>


<p>Do you see the odd <codel>&amp;</codel> sign in front of the variable <codel>MaxSheep</codel>? It’s not a coincidence. Forgive us, but at this stage of your education, our explanations of this phenomenon will be rather simplistic. Actually, this is part of a more general and rather complex issue that we want to discuss later.</p>

<p>For now, we’ll tell you that whenever we use the variable name in the program (e.g. <codel>MaxSheep</codel>) we mean the <b>value</b> that this variable is currently storing.</p>

<p>However, the interests of the <codel>scanf</codel> function are different – it isn’t at all interested in the variable's value, because it will soon be replaced by the one the user enters.</p>

<p><codel>scanf</codel> needs something completely different: precisely <b>where is the variable placed in the memory?</b> The mysterious <codel>&amp;</codel> is a unary operator which gives the information about its argument's location. The <codel>scanf</codel>'s format provides information about the <b>type</b> of the data while the <codel>&amp;</codel>, along with the variable name, says <b>where</b> it has to be placed. Leaving out the <codel>&amp;</codel> doesn’t cause any problems during compilation, so therefore you have to remember that <codel>scanf</codel> <b>essentially needs it</b> and cannot operate without the <codel>&amp;</codel>.</p>

<p>Furthermore, the scanf format uses <b>the same specifiers</b> as <codel>printf</codel>. This should bring to you a sigh of relief.</p>
                            </div>

                                <!--?lit$879552982$--><div tabindex="0" class="beforeHtml"><!--?lit$879552982$--><p>Now we’ll show you a simple yet complete program that does the following:</p>

<ul>
<li><b>prompts</b> the user to enter a single integer value;</li>
<li><b>squares</b> it;</li>
<li><b>prints</b> the result with an appropriate comment.</li>
</ul>

<p>We assure you that analyzing this program shouldn’t be any problem for you.</p>

                                <!--?lit$879552982$--><div tabindex="0" class="beforeHtml"><!--?lit$879552982$--><p>Do you prefer square roots to squares? No problem, but we need to remember two things: first, there’s no such thing as the <i><b>square root operator</b></i>; second, <b>square roots of negative numbers do not exist</b>.</p>

<p>We can resolve the former issue by finding a <b>function</b> that knows how to compute the root. This function exists and takes an argument of type <codel>float</codel>. The result is also a <codel>float</codel> (obviously, the square of an integer is still an integer, but the root of any number is not always an integer, like the square root of <codel>2</codel>). </p>

<p>The function we’re going to use is called <codel>sqrt</codel> (<b>square root float</b>) and requires just <b>one argument</b>. Oh, one more thing – to use this function, you must <b>include</b> a header file named <codel>math.h</codel>.</p>

<p>We need to deal with negative numbers as well. If you’re so reckless as to provide a negative number, the program will just ignore you and your input completely. It may not be polite, but at least we won’t be trying to bend the rules of mathematics. Whether we see the result or not will be decided by the conditional statement.</p>

<p>Now direct your attention to the use of floating point data and the <codel>sqrt</codel> function.</p>

<p>The program is in the editor.</p>

<br></div>

                            <!--?lit$879552982$--><h2>Level of difficulty</h2>
<p>Easy</p>

<p>Familiarize the student with:</p>
<ul>
<li>Printing data in different formats</li>
<li>Fixing errors in a program</li>
</ul>

<h2>Scenario</h2>
<p>According to ISO 8601, many countries use the YYYY-MM-DD date format, where YYYY is a four-digit year, MM means a two-digit month, and DD means a two-digit day (one letter means no leading zeros). Local conventions can vary, and sometimes include formats like DD-MM-YYYY or MM-DD-YYYY.</p>

<p>Your task is to print values in four different formats. Check the program in the editor.</p>

<p>Find all possible compilation errors and logic errors. Fix them, but do not change any character values. Your version of the program must print the same result as the expected output. </p>

<p>Before you use the compiler, try to find the errors only by manual code analysis.
</p>

                            <!--?lit$879552982$--><h2>Level of difficulty</h2>
<p>Easy</p>

<h2>Objectives</h2>
<p>Familiarize the student with:</p>
<ul>
<li>Printing data in different formats</li>
<li>Fixing errors in a program</li>
</ul>


<h2>Scenario</h2>
<p>You have the data (included in code) of three students' grades (<codel>StudentA</codel>, <codel>StudentB</codel>, <codel>StudentC</codel>). Write a program to print this data in rows - the first row is a header in the format:</p>

<br>
                            </div>
                        
                        <div class="code__wrapper ">
                        <!--?lit$879552982$-->
                            <pre class="no-syntax " data-line=""><code><span>Student name  1stYGrade  2ndYGrade  3rdYGrade  Avg</span></code></pre>
                        <span class="label label-output">Output</span></div>
                        <!--?lit$879552982$-->
                            <div class="after-body-text" tabindex="0">
                                <!--?lit$879552982$--><br>

<p>The next three rows contain: student name (<codel>StudentA</codel>, <codel>StudentB</codel>, <codel>StudentC</codel> is enough), grade (<codel>1stYGrade 2ndYGrade 3rdYGrade</codel>), and the average of these three grades (<codel>Avg</codel>). Your version of the program must print the same result as the expected output. </p>

<p>To print only two digits of a floating-point number, use the <codel>"%.2f"</codel> format specifier, and to fill it with spaces you can use the <codel>"%9.2f"</codel> format specifier where <i>9</i> is the length of the number and spaces.</p>

                            <!--?lit$879552982$--><h2>Level of difficulty</h2>

<h2>Objectives</h2>
<p>Familiarize the student with:</p>
<ul>
<li>Getting data from the user</li>
<li>Printing data in different formats</li>
<li>Fixing errors in a program</li>
</ul>


<h2>Scenario</h2>
<p>Write a program that asks the user for a day and month (separate integer values for both). Next, it should print the day number of the year for the given day and month. </p>

<p>Assume that the year is a leap year (February has 29 days). Your program must print the same result as the expected output.</p>

<p>Test the program for days of different months. Assume that the user input is valid.

                            <!--?lit$879552982$--><h2>Level of difficulty</h2>
<p>Easy</p>

<h2>Objectives</h2>
<p>Familiarize the student with:</p>
<ul>
<li>Getting data from the user</li>
<li>Validating the input</li>
<li>Processing the data</li>
<li>Printing data in different formats</li>
<li>Fixing errors in a program</li>
</ul>

<h2>Scenario</h2>
<p>Write a program that prints the name of a given day of the week. Your program must print the same result as the expected output. This task is similar to the previous lab, but this time you have to get the day of the week from the user and validate the input.</p>

<p>Test the program for all the days of the week (add code to print a message to the user when he/she enters an invalid day of the week).
</p>

                            <!--?lit$879552982$--><h2>Level of difficulty</h2>
<p>Easy</p>

<h2>Objectives</h2>
<p>Familiarize the student with:</p>
<ul>
<li>Getting data from the user</li>
<li>Validating the input</li>
<li>Processing the data</li>
<li>Printing data in different formats</li>
<li>Fixing errors in a program</li>
</ul>


<h2>Scenario</h2>
<p>Write a program that asks the user for a day, month and year (as separate integer values). Next, it should print the day number of the year for the given day, month and year. </p>

<p>This task is similar to one of the previous labs, but this time you have to get the year from the user and check if that year is a leap year. You must use this information (whether this is a leap year or not) for computation.
Your program must print the same result as the expected output. 
Test it for several days of different years (check some of them on paper). Assume that the user input is valid.
</p>
