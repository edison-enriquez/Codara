                    <!--?lit$432842251$--><p>A computer executes the program and provides the answers.</p>

<p>The program must be able to react according to the answers it receives.</p>

<p>Fortunately, computers know only two kinds of answer: <b><i>yes, this is true or no, this is false.</i></b></p>

<p>You will never get a response like “I don’t know” or “Probably yes, but I don’t know for sure”.</p>

<p>To ask questions, the “C” language uses a set of very special operators.</p>

<p>Let’s go through them one by one, illustrating their effects using some simple examples.</p>

                            <div class="before-body-text" tabindex="0">
                            <!--?lit$432842251$--><p>Question: are two values equal?</p>

<p>To ask this question you use the <codel>==</codel> (<b><i>equal equal</i></b>) operator:</p>

<br>
                            </div>
                        
                        <div class="code__wrapper ">
                        <!--?lit$432842251$-->
                            <button class="button-copy" aria-label="undefined">
                  <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="copy" class="svg-inline--fa fa-copy fa-w-14" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
                    <path fill="currentColor" d="M320 448v40c0 13.255-10.745 24-24 24H24c-13.255 0-24-10.745-24-24V120c0-13.255 10.745-24 24-24h72v296c0 30.879 25.121 56 56 56h168zm0-344V0H152c-13.255 0-24 10.745-24 24v368c0 13.255 10.745 24 24 24h272c13.255 0 24-10.745 24-24V128H344c-13.2 0-24-10.8-24-24zm120.971-31.029L375.029 7.029A24 24 0 0 0 358.059 0H352v96h96v-6.059a24 24 0 0 0-7.029-16.97z"></path>
                  </svg>
                </button><pre class="language-c " data-line=""><code>x <span class="token operator">==</span> y</code></pre>
                        </div>
                        <!--?lit$432842251$-->
                            <div class="after-body-text" tabindex="0">
                                <!--?lit$432842251$--><br>

<p>Don't forget this important distinction:</p>

<ul>
<li><codel>=</codel> is an <b>assignment operator</b></li>
<li><codel>==</codel> is the <b>question “<i>are these values equal?”</i></b></li>
<li><codel>==</codel> is a <b>binary</b> operator with left-side binding. It needs two arguments and checks if they’re equal.</li>
</ul>

<p>Now let’s ask a few more questions. Try to guess the answers.</p>

                            <!--?lit$432842251$--><p>What can we do with the answer we get from the computer? There are at least two possibilities: first, we can <b>memorize it</b> (store it in a variable) and make use of it later. How do we do that? Well, we would use an arbitrary variable of type <codel>int</codel>, like this:</p>

<br>

<p>If the answer is <codel>true</codel> because <codel>Value1</codel> is greater than or equal to <codel>Value2</codel>, the computer will assign <codel>1</codel> to <codel>Answer</codel> (<codel>1</codel> is arguably different from zero). If <codel>Value1</codel> is less than <codel>Value2</codel>, the variable <codel>Answer</codel> will be assigned <codel>0</codel>.</p>

                            <div class="before-body-text" tabindex="0">
                            <!--?lit$432842251$--><p>You already know how to ask, but you still don’t know how to make reasonable use of the answers. We must have a mechanism which allows us to do something if a condition is met and not to do it if it isn’t. It's just like in life: we do certain things or we don’t when a specific condition is met or not, e.g. we go for a walk if the weather is good, or stay home if it’s wet and cold.</p>

<p>To make these decisions, the “C” language has a special instruction. Due to its nature and its application, it’s called a <b>conditional instruction</b> (or <b>conditional statement</b>).</p>

<p>There are several variants of the conditional instruction. We’ll start with the simplest, and slowly move on to the more difficult ones. The first form of a conditional statement, which you can see below, is written very informally but figuratively:</p>

<p class="font-size-big"><b>if</b>(true_or_not) do_this_<b>if</b>_true;</p><p></p>

                            <div class="before-body-text" tabindex="0">
                            <!--?lit$432842251$--><p>This conditional statement consists of the following, strictly necessary, elements in this and this order only:</p>

<ul>
<li><b>if</b> keyword;</li>
<li>left (opening) parenthesis;</li>
<li>an <b>expression</b> (a <b>question</b> or an <b>answer</b>) whose value will be interpreted solely in terms of “true” (when its value is non-zero) and “false” (when it is equal to zero);</li>
<li>right (closing) parenthesis;</li>
<li>an <b>instruction</b> (only <b>one</b>, but we’ll learn how to deal with that limitation).</li>
</ul>

<p>How does this statement <i>work</i>?</p>

<ul>
<li>if the <codel>true_or_not</codel> expression enclosed inside the parentheses represents the truth (i.e. its <i>value is not equal to zero</i>), the statement behind this condition (<codel>do_this_if_true</codel>) will be executed;</li>
<li>if the <codel>true_or_not</codel> expression represents a <b>falsehood</b> (its <i>value is equal to zero</i>), the statement behind this condition is <b>omitted</b> and the next executed instruction will be the one that lies after the conditional statement.</li>
</ul>

<p>In real life we often express a will:</p>

<p><i>if the weather is good we will go for a walk
next, we will have lunch</i></p>

<p>As you can see, having lunch is not a conditional activity and doesn’t depend on the weather (what luck). Knowing what conditions influence our behavior and assuming that we have the parameterless functions <codel>GoForAWalk()</codel> and <codel>HaveLunch()</codel> we can write the following snippet:</p>

<br>

                            <div class="before-body-text" tabindex="0">
                            <!--?lit$432842251$--><p>We’ve said that there may be only one statement after the <codel>if</codel> statement. When we have to <b>conditionally</b> execute more than one instruction, we need to use braces <codel>{</codel> and <codel>}</codel> which create a structure known as a <b>compound statement</b> or (much simpler) a <b>block</b>. The block is treated as a single instruction by the compiler.</p>

<p>This is how we can circumvent the <codel>if</codel> statement limitation.</p>

<p>Let’s treat our programmer a little nicer:</p>

<br>
                            </div>
                        
                        <div class="code__wrapper ">
                        <!--?lit$432842251$-->
                            <button class="button-copy" aria-label="undefined">
                  <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="copy" class="svg-inline--fa fa-copy fa-w-14" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
                    <path fill="currentColor" d="M320 448v40c0 13.255-10.745 24-24 24H24c-13.255 0-24-10.745-24-24V120c0-13.255 10.745-24 24-24h72v296c0 30.879 25.121 56 56 56h168zm0-344V0H152c-13.255 0-24 10.745-24 24v368c0 13.255 10.745 24 24 24h272c13.255 0 24-10.745 24-24V128H344c-13.2 0-24-10.8-24-24zm120.971-31.029L375.029 7.029A24 24 0 0 0 358.059 0H352v96h96v-6.059a24 24 0 0 0-7.029-16.97z"></path>
                  </svg>
                </button><pre class="language-c " data-line=""><code><span class="token keyword">if</span><span class="token punctuation">(</span>SheepCounter <span class="token operator">&gt;=</span> <span class="token number">120</span><span class="token punctuation">)</span> <span class="token punctuation">{</span> <span class="token function">MakeABed</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span> <span class="token function">TakeAShower</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span> <span class="token function">SleepAndDream</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span> <span class="token punctuation">}</span>
<span class="token function">FeedTheSheepdogs</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span></code></pre>
                        </div>
                        <!--?lit$432842251$-->

                            <!--?lit$432842251$--><p>Now it’s time for some stylistic remarks. Writing blocks one after the other is, of course, syntactically correct, but very <b>inelegant</b>. It may cause the text of our program to run outside the right margin of the editor. There are a few styles of coding the blocks. We won't try to argue that some of them are better than others, but we will be using the <i><b><a style="color: #00bceb;" href="https://en.wikipedia.org/wiki/Indentation_style#K&amp;R_style" target="_blank">K &amp; R style</a></b></i>. The letters K and R are the initials of the creators of the “C” language, Mr. <b>K</b>ernighan and Mr. <b>R</b>itchie. They presented this style in their classic book and we will follow it.</p>

<p>The same snippet, written in accordance with the <i>K &amp; R style</i>, will look as follows:</p>

<br>
                            </div>
                        
                        <div class="code__wrapper ">
                        <!--?lit$432842251$-->
                            <button class="button-copy" aria-label="undefined">
                  <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="copy" class="svg-inline--fa fa-copy fa-w-14" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
                    <path fill="currentColor" d="M320 448v40c0 13.255-10.745 24-24 24H24c-13.255 0-24-10.745-24-24V120c0-13.255 10.745-24 24-24h72v296c0 30.879 25.121 56 56 56h168zm0-344V0H152c-13.255 0-24 10.745-24 24v368c0 13.255 10.745 24 24 24h272c13.255 0 24-10.745 24-24V128H344c-13.2 0-24-10.8-24-24zm120.971-31.029L375.029 7.029A24 24 0 0 0 358.059 0H352v96h96v-6.059a24 24 0 0 0-7.029-16.97z"></path>
                  </svg>
                </button><pre class="language-c " data-line=""><code><span class="token keyword">if</span><span class="token punctuation">(</span>SheepCounter <span class="token operator">&gt;=</span> <span class="token number">120</span><span class="token punctuation">)</span><span class="token punctuation">{</span>
    <span class="token function">MakeABed</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
    <span class="token function">TakeAShower</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
    <span class="token function">SleepAndDream</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
<span class="token punctuation">}</span>

<span class="token function">FeedTheSheepdogs</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span></code></pre>
                        </div>
                        <!--?lit$432842251$-->
                            <div class="after-body-text" tabindex="0">
                                <!--?lit$432842251$--><br>

<p>Note that a conditionally executed block is <b>indented</b> – it improves the readability of the program and manifests its conditional nature.</p>

<p>In the next section, we’re going to discuss another variant of the conditional statement, which also allows you to perform an action only when the condition is not met.</p>

<p>Now feed your sheep dogs, please. They’ve been waiting ages for your attention.</p>

                            <!--?lit$432842251$--><h2>Level of difficulty</h2>
<p>Easy</p>

<h2>Objectives</h2>
<p>Familiarize the student with:</p>
<ul>
<li>Conditions and conditional executions</li>
<li>Fixing errors in a program</li>
<li>Printing on screen</li>
</ul>

<h2>Scenario</h2>
<p>Write a small program which prints the absolute value of a given number if the number is less than zero. Next it should print the value of the given number on a separate line.</p>


<p>Your program must print the same result as the expected output. 
Test it for several other cases (positive numbers, other negative numbers, etc.)
</p>

                            <!--?lit$432842251$--><h2>Level of difficulty</h2>
<p>Easy</p>

<h2>Objectives</h2>
<p>Familiarize the student with:</p>
<ul>
<li>Conditions and conditional executions</li>
<li>Fixing errors in a program</li>
<li>Printing on screen</li>
</ul>

<h2>Scenario</h2>
<p>Write a program that prints the name of a given day of the week. Your program must print the same result as the expected output.</p>

<p>Test it for all days of the week (for now, test it only for valid values).</p>
