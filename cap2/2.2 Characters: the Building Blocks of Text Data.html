                            <!--?lit$432842251$--><br>

<p>We can define a <i>word</i> as a <b>string of characters</b> (letters, numbers, punctuation marks, etc.). We dealt with these strings during the first lesson when we used the <codel>puts</codel> function to write some text on the computer screen.</p>

<p>Now, however, we we’re going to ignore strings consisting of multiple characters and focus our attention on single characters. The problem with processing strings, though, will come back to haunt us when we start working on arrays, because in the “C” language all strings are treated as <b>arrays</b>.</p>

<p>To store and manipulate characters, the “C” language provides a special type of data. This type is called a <b>char</b>, which is an abbreviation of the word <i>character</i>.</p>

<p>Let's try to declare a variable for storing a single character:</p>

<br>

                    <div class="component-widge" tabindex="0">
                    <!--?lit$432842251$--><p>Computers store characters as numbers. Every character used by a computer corresponds to a unique number, and vice versa. This system of assignments includes more characters than you would probably expect. Many of them are invisible to humans but essential for computers.</p>

<p>Some of these characters are called <b>white spaces</b>, while others are named <b>control characters</b>, because their purpose is to <b>control</b> the input/output devices. An example of a white space that is completely invisible to the naked eye is a special code, or a pair of codes (different operating systems may treat this issue differently), which are used to mark the ends of lines inside text files. People don’t see this sign (or these signs), but they can see their effect where the lines are broken.</p>

                    <!--?lit$432842251$--><br>


<p>We can create virtually any number of assignments, but a world in which each computer type uses different character encoding would be extremely inconvenient. This has created a need to introduce a universal and widely accepted standard implemented by (almost) all computers and operating systems all over the world. <b>ASCII</b> (which is a short for <i>American Standard Code for Information Interchange</i>) is the most widely used system in the world, and it’s safe to assume that nearly all modern devices (like computers, printers, mobile phones, tablets, etc.) use this code.</p>


<p>The code provides space for 256 different characters, but we’re only interested in the first 128. If you want to see how the code is constructed, go to the table on the right.</p>

<p>Look at it carefully – there are some interesting facts about it that you might notice. We'll show you one. Do you see what the code of the most common character is – the space? Yes – it’s 32. Now look at what the code of the lower-case letter “a” is. It’s 97, right? And now let's find the upper-case “A”. Its code is 65. What’s the difference between the code of “a” and “A”? It’s 32. Yes, that's the code of a space. We’ll use that interesting feature of the ASCII code soon.</p>

<p>Also, note that the letters are arranged in <b>the same order</b> as in the <b>Latin alphabet</b>.</p>

                            <div class="before-body-text" tabindex="0">
                            <!--?lit$432842251$--><p>How do we use the values of the <codel>char</codel> type in the “C” language? We can do it in two ways, which are not entirely equivalent.</p>

<p>The first way allows us to specify the character itself, but <b>enclosed in single quotes</b>: <codel>''</codel> (apostrophes). Let’s assume that we want the variable we declared a few slides earlier to be assigned the value of the upper-case letter <codel>A</codel>.</p>

<p>We do this as follows:</p>

<br>
                            </div>
                        
                        <div class="code__wrapper ">
                        <!--?lit$432842251$-->
                            <button class="button-copy" aria-label="undefined">
                  <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="copy" class="svg-inline--fa fa-copy fa-w-14" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
                    <path fill="currentColor" d="M320 448v40c0 13.255-10.745 24-24 24H24c-13.255 0-24-10.745-24-24V120c0-13.255 10.745-24 24-24h72v296c0 30.879 25.121 56 56 56h168zm0-344V0H152c-13.255 0-24 10.745-24 24v368c0 13.255 10.745 24 24 24h272c13.255 0 24-10.745 24-24V128H344c-13.2 0-24-10.8-24-24zm120.971-31.029L375.029 7.029A24 24 0 0 0 358.059 0H352v96h96v-6.059a24 24 0 0 0-7.029-16.97z"></path>
                  </svg>
                </button><pre class="language-c " data-line=""><code>Character <span class="token operator">=</span> <span class="token char">'A'</span><span class="token punctuation">;</span></code></pre>
                        </div>
                        <!--?lit$432842251$-->
                            <div class="after-body-text" tabindex="0">
                                <!--?lit$432842251$--><br>

<p>You’re not allowed to omit apostrophes under any circumstances.</p>
                            </div>

                            <div class="before-body-text" tabindex="0">
                            <!--?lit$432842251$--><p>The second method consists of assigning a <b>non-negative integer value</b> that is the code of the desired character. This means that the assignment below will put an <codel>A</codel> into the character variable:</p>

<br>
                            </div>
                        
                        <div class="code__wrapper ">

                        <!--?lit$432842251$-->
                            <div class="after-body-text" tabindex="0">
                                <!--?lit$432842251$--><br>

<br>

<p>The second solution, however, is less recommended and if you can avoid it, you should. Why? </p>

<p>Firstly, because it’s <b>illegible</b>. Without knowing ASCII code, it’s impossible to guess what that <codel>65</codel> really means. Perhaps this is the code for a character, but it can also happen that a sociopathic programmer uses this devious way to save the number of sheep that have already been counted.</p>

<p>The second reason is more exotic, but still true. There’s a significant number of computers in the world which use codes <b>other than ASCII</b>. For example, many of the IBM mainframes use a code commonly called <b>EBCDIC</b> (<i>Extended Binary Coded Decimal Interchange Code</i>) which is very different from ASCII and is based on radically different concepts.</p>

<br>

                            <!--?lit$432842251$--><p>Now imagine that you’ve written a wonderful program and decided to compile and run it on a computer utilizing the EBCDIC code. If you wrote something like this:</p>

                    <div class="component-widge" tabindex="0">
                    <!--?lit$432842251$--><p>Now’s probably a good time to bring a new term into the mix: a <b>literal</b>. The literal is a symbol which <b>uniquely identifies its value</b>. Some prefer to use a different definition: the <b>literal means itself</b>. Choose the definition that you consider to be clearer and look at the following simple examples:</p>

<ul>
<li><codel>Character</codel> - this is not a literal; it’s probably a variable name; when you look at it, you cannot guess what value is currently assigned to that variable;</li>
<li><codel>'A'</codel> - this is a literal; when you look at it you can immediately guess its value; you even know that it’s a literal of the <codel>char</codel> type;</li>
<li><codel>100</codel> - this is a literal, too (of the <codel>int</codel> type);</li>
<li><codel>100.0</codel> - this is another literal, this time of a floating point type;</li>
<li><codel>i + 100</codel> - this is a combination of a variable and a literal joined together with the <codel>+</codel> operator; this structure is called an <b>expression</b>.</li>
</ul>

<br>

                            <!--?lit$432842251$--><p>If you’re an inquisitive person, you probably want to ask a question: if a literal of type <i>char</i> is given as the character enclosed in apostrophes, how do we code the apostrophe itself?</p>

<p>The “C” language uses a special convention which also extends to other characters, not only to apostrophes. Let's start with an apostrophe anyway. The correct format looks as follows:</p>

<br>
                            </div>

                        <!--?lit$432842251$-->
                            <button class="button-copy" aria-label="undefined">
                  <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="copy" class="svg-inline--fa fa-copy fa-w-14" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">

                  </svg>
                </button><pre class="language-c " data-line=""><code>Character <span class="token operator">=</span> <span class="token char">'\''</span><span class="token punctuation">;</span></code></pre>
                        </div>
                        <!--?lit$432842251$-->
                            <div class="after-body-text" tabindex="0">
                                <!--?lit$432842251$--><br>

<p>The <codel>\</codel> character (called <i>backslash</i>) acts as an <b>escape character</b>, because by using the <codel>\</codel> we can escape from the normal meaning of the character that follows the slash. In this example, we <b>escape</b> from the usual role of the apostrophe (i.e., delimiting the literals of type <codel>char</codel>).</p>

                    <div class="component-widge" tabindex="0">
                    <!--?lit$432842251$--><p>The “C” language allows us to escape in other circumstances too. Let's start with those that denote literals representing white spaces.</p>

<p><codel>\n</codel> – denotes a <b>transition to a new line</b> and is sometimes called an <b>LF</b> (<b>Line Feed</b>), as printers react to this character by pulling out the paper by one line of text.</p>

<p><codel>\r</codel> – denotes the <b>return to the beginning of the line</b> and is sometimes called a <b>CR</b> (<b>Carriage Return</b> – “carriage” was the synonym of a “print head” in the typewriter era); printers respond to this character as if they are told to re-start printing from the left margin of the already printed line.</p>

<p><codel>\a</codel> (as in <b>alarm</b>) is a relic of the past when teletypes were often used to communicate with computers (do you know what a teletype is, are you old enough to remember them?); sending this character to a teletype turns on its ringer; hence, the character is officially called <b>BEL</b> (as in <b>bell</b>); interestingly, if you try to send the character to the screen, you’ll hear a sound – it won't be a real ringing but rather a short beep. The power of tradition works even in the IT world.</p>

<p><codel>\0</codel> (note: the character after the backslash is a zero, not the letter <i>O</i>) called <b>nul</b> (from the Latin word <b>nullus</b> – none) is a character that <b>does not represent any character</b>; despite first impressions, it could be very useful, as we’ll show you in the lessons to come.</p>

                    </div>

                        <!--?lit$432842251$-->
                            <div class="before-body-text" tabindex="0">
                            <!--?lit$432842251$--><p>There’s an assumption in the “C” language that may seem surprising at first glance: the <codel>char</codel> type is treated as a special kind of <codel>int</codel> type. This means that:</p>

<ul>
<li>You can always <b>assign a <codel>char</codel> value</b> to an <codel>int</codel> variable;</li>
<li>You can always assign an <codel>int</codel> value to a <codel>char</codel> variable, but if the value exceeds 255 (the top-most character code in ASCII), you must expect a loss of value;</li>
<li>The value of the <codel>char</codel> type can be subject to the <b>same operators</b> as the data of type <codel>int</codel>.</li>
</ul>

<p>We can check this using a simple example. We said earlier that in ASCII, the “distance” between upper and lower case letters is 32, and that 32 is the code of the space character. Look at this snippet:</p>

<br>
                            </div>
                        
                        <div class="code__wrapper ">
                        <!--?lit$432842251$-->
                            <button class="button-copy" aria-label="undefined">
                  <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="copy" class="svg-inline--fa fa-copy fa-w-14" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
                    <path fill="currentColor" d="M320 448v40c0 13.255-10.745 24-24 24H24c-13.255 0-24-10.745-24-24V120c0-13.255 10.745-24 24-24h72v296c0 30.879 25.121 56 56 56h168zm0-344V0H152c-13.255 0-24 10.745-24 24v368c0 13.255 10.745 24 24 24h272c13.255 0 24-10.745 24-24V128H344c-13.2 0-24-10.8-24-24zm120.971-31.029L375.029 7.029A24 24 0 0 0 358.059 0H352v96h96v-6.059a24 24 0 0 0-7.029-16.97z"></path>
                  </svg>
                </button><pre class="language-c " data-line=""><code><span class="token keyword">char</span> Char<span class="token punctuation">;</span>
Char <span class="token operator">=</span> <span class="token char">'A'</span><span class="token punctuation">;</span>
Char <span class="token operator">+=</span> <span class="token number">32</span><span class="token punctuation">;</span>
Char <span class="token operator">-=</span> <span class="token char">' '</span><span class="token punctuation">;</span></code></pre>

                            <!--?lit$432842251$--><h2>Level of difficulty</h2>
<p>Easy</p>

<h2>Objectives</h2>
<p>Familiarize the student with:</p>
<ul>
<li>Character types and values</li>
<li>Fixing errors in a program</li>
<li>Printing on screen</li>
</ul>

<h2>Scenario</h2>
<p>Check the program below. Find all possible compilation errors and logic errors. Fix them, but you may not change any character values. You may change variable names. 
Your version of the program must print the same result as the expected output. Before you use your compiler, try to find the errors only by manual code analysis.
</p>


<h2>Expected output</h2>

<br>

                            <!--?lit$432842251$--><h2>Level of difficulty</h2>
<p>Easy</p>

<h2>Objectives</h2>
<p>Familiarize the student with:</p>
<ul>
<li>Character types and values</li>
<li>Using character types practically</li>
<li>Printing on screen</li>
</ul>

<h2>Scenario</h2>
<p>Write a small program which prints the differences between all ten digit characters (from '1' to '0') and zero ('0'). Print each one on a separate line. Your program must print the same result as the expected output. 
</p>
