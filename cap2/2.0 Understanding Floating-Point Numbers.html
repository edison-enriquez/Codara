                    <div class="component-widge" tabindex="0">
                    <!--?lit$432842251$--><p>In our first lesson, we became acquainted with the concept of the data type and learned that one of the basic types known in the “C” language is the integer type named <i>int</i>.</p>

<p>Now it's time to talk about another type, which is designed to represent and to store numbers that (as a mathematician would say) have a <b>non-empty decimal fraction</b>.</p>

<p>In other words, they’re the numbers that have (or may have) a fractional part after the decimal point, and although such a definition is very poor, it’s certainly good enough for our purposes. Whenever we use a term like “two and a half” or “zero point four”, we think of numbers which a computer considers <b>floating numbers</b>.</p>

                            <!--?lit$432842251$--><p>Let's go back to the values we quoted a moment ago. “<i>Two and a half</i>” looks normal when you write it in a program, although if your native language prefers to use a comma instead of a point in the number, you should ensure that your number doesn’t contain any commas. The compiler won’t accept it, or (in very rare but possible cases) will misunderstand your intentions, as the comma itself has its own reserved meaning in the “C” language.</p>

<p>If you want to use a value of just “<i>two and a half</i>”, you should write it as shown in the picture. Note once again – there is a <b>point</b> between “2” and “5” - not a comma.</p>

<p>As you can probably imagine, the value of “<i>zero point four</i>” could be written in “C” as:</p>

<br>
                            </div>
                        
                        <div class="code__wrapper ">
                        <!--?lit$432842251$-->
                            <pre class="no-syntax " data-line=""><code><span>4.0</span></code></pre>
                        </div>
                        <!--?lit$432842251$-->
                            <div class="after-body-text" tabindex="0">
                                <!--?lit$432842251$-->

<p>Don't forget this simple rule: you can <b>omit</b> zero when it’s the only digit in front of or after the decimal point. In essence, you can write the value 0.4 as shown on the right.</p>

                    <!--?lit$432842251$--><p>For you, they might be exactly the same, but the “C” compiler sees these two numbers in a completely different way:</p>

<li><codel>4</codel> is an <i>int</i> (represents integers, i.e., whole numbers).</li>
<li><codel>4.0</codel> is a <i>double</i> (represents double-precision floating-point numbers - they have fifteen decimal digits of precision and can be easily assigned to <i>float</i>s, i.e., single-precision floating-point numbers which have six decimal digits of precision. We'll tell you more about the difference between the <codel>double</codel> and <codel>float</codel> data types soon.)</li>

                            <div class="before-body-text" tabindex="0">
                            <!--?lit$432842251$--><p>Let's go back to the floating-point values. You already know what a variable is and how you can declare an integer variable, so it’ll be no surprise to you how to declare variables of a floating-point type. This can be done using the keyword <i><b>double</b></i> for floating-point numbers of type <i>double</i>, and the keyword <b><i>float</i></b> for floating-point numbers of type <i>float</i>.</p>

<p>Knowing that we can declare two floating-point variables, we're going to declare one named <codel>PI</codel> (we can't name it <b>Π</b> because – as you already know – the “C” language does not allow variable names written with Greek letters) and the other one named <codel>Field</codel>. We don't need a high degree of precision for our calculations (and we want to save memory), so we're going to use the <i>float</i> data type:</p>

<br>

                            <div class="before-body-text" tabindex="0">
                            <!--?lit$432842251$--><p>As you can see, from the syntax's point of view, the difference in declaring integer and float variables is quite small.</p>

<br>
                            </div>
                        
                        <div class="code__wrapper ">
                        <!--?lit$432842251$-->
                            <button class="button-copy" aria-label="undefined">
                  <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="copy" class="svg-inline--fa fa-copy fa-w-14" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
                    <path fill="currentColor" d="M320 448v40c0 13.255-10.745 24-24 24H24c-13.255 0-24-10.745-24-24V120c0-13.255 10.745-24 24-24h72v296c0 30.879 25.121 56 56 56h168zm0-344V0H152c-13.255 0-24 10.745-24 24v368c0 13.255 10.745 24 24 24h272c13.255 0 24-10.745 24-24V128H344c-13.2 0-24-10.8-24-24zm120.971-31.029L375.029 7.029A24 24 0 0 0 358.059 0H352v96h96v-6.059a24 24 0 0 0-7.029-16.97z"></path>
                  </svg>
                </button><pre class="language-c " data-line=""><code><span class="token keyword">int</span> i<span class="token punctuation">;</span>
<span class="token keyword">float</span> x<span class="token punctuation">;</span>

i <span class="token operator">=</span> <span class="token number">10</span> <span class="token operator">/</span> <span class="token number">4</span><span class="token punctuation">;</span>
x <span class="token operator">=</span> <span class="token number">10.0</span> <span class="token operator">/</span> <span class="token number">4.0</span><span class="token punctuation">;</span></code></pre>
                        </div>
                        <!--?lit$432842251$-->
                            <div class="after-body-text" tabindex="0">
                                <!--?lit$432842251$--><br>

<p>This difference is very significant in terms of semantics, which is shown by the example on the right. With a little anticipation, we can say that the symbol (more precisely – the <b>operator</b>) which performs the mathematical division is a single character <b>/</b> (slash). Take a look at this code.</p>

<p>You might find it a little surprising, however, that the value placed in the variable <codel>i</codel> is 2 (yes, just 2!), while the variable <codel>x</codel> is equal to 2.5. Look at this example carefully, because it illustrates a very important difference between these two data types.</p>
                            </div>

                            <div class="before-body-text" tabindex="0">
                            <!--?lit$432842251$--><p>What happens when we’re forced to convert integer values into float values or vice versa? The transformation from type int into float is always possible and feasible, but in some cases can cause a loss of accuracy. Consider the example below:</p>

<br>
                            </div>
                        
                        <div class="code__wrapper ">
                        <!--?lit$432842251$-->
                            <button class="button-copy" aria-label="undefined">
                  <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="copy" class="svg-inline--fa fa-copy fa-w-14" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
                    <path fill="currentColor" d="M320 448v40c0 13.255-10.745 24-24 24H24c-13.255 0-24-10.745-24-24V120c0-13.255 10.745-24 24-24h72v296c0 30.879 25.121 56 56 56h168zm0-344V0H152c-13.255 0-24 10.745-24 24v368c0 13.255 10.745 24 24 24h272c13.255 0 24-10.745 24-24V128H344c-13.2 0-24-10.8-24-24zm120.971-31.029L375.029 7.029A24 24 0 0 0 358.059 0H352v96h96v-6.059a24 24 0 0 0-7.029-16.97z"></path>
                  </svg>
                </button><pre class="language-c " data-line=""><code><span class="token keyword">int</span> i<span class="token punctuation">;</span>
<span class="token keyword">float</span> f<span class="token punctuation">;</span>

i <span class="token operator">=</span> <span class="token number">100</span><span class="token punctuation">;</span>
f <span class="token operator">=</span> i<span class="token punctuation">;</span></code></pre>
                        </div>
                        <!--?lit$432842251$-->
                            <div class="after-body-text" tabindex="0">
                                <!--?lit$432842251$--><br>

<p>After the second assignment, the value of the variable <i>f</i> is 100.0, because the value of type <i>int</i> (100) is automatically <b>converted</b> into a <i>float</i> (100.0). The transformation affects the <b>internal</b> (machine) representation of those values, as computers use different methods for storing <i>floats</i> and <i>ints</i> in their memory.</p>

<br>

<p>Let's consider the opposite situation now.</p>

<p>As you’ve probably guessed, these substitutions result in a loss of accuracy – the value of the variable <i>i</i> will be 100. Twenty-five hundredths has no meaning in the <i>int</i> world. There’s another aspect of the operation: converting a <i>float</i> into an <i>int</i> is not always feasible. Integer variables (like <i>floats</i>) have a <b>limited capacity</b>. </p>

                                <!--?lit$432842251$--><br>

<p>The <i>i</i> variable is unable to store such a large value, but it isn’t clear what will happen during the assignment. Certainly, a <b>loss of accuracy</b> will occur, but the value assigned to the variable <i>i</i> is not known in advance. In some systems, it may be the maximum permissible <i>int</i> value, while in others an error occurs, and in others still the value assigned may be completely random.</p>

<p>Your version of the program must print the same result as the expected output.
