                    <!--?lit$1951582493$--><p>We want to ask you a strange question: how long do you usually take to wash your hands? Don’t think about it, just answer.</p>

<p>Well, when your hands are very dirty, you wash them for a very long time. Otherwise it takes less time. You then keep washing your hands until they're clean.</p>

<p>Look at the statement below. Do you agree with it?</p>

<p style="font-size:24px"><font face="Courier New">while my hands are dirty
<br>&nbsp;&nbsp;&nbsp;&nbsp;I am washing my hands;</font></p>

<p>Note that this also implies that if our hands are clean, we won’t wash them at all.</p>

<p>So now you've learnt one of the <b>loops</b> available in the “C” language. In general, the loop manifests itself as follows:</p>

<p style="font-size:24px"><font face="Courier New">while(conditional_expression)
<br>&nbsp;&nbsp;&nbsp;&nbsp;statement;</font></p>

<p>If you’ve noticed some similarities to the <codel>if</codel> instruction, good job. In fact, there’s only one syntactic difference: we use the word <i>while</i> instead of <i>if</i>.</p>

<p>The semantic difference, however, is more important:</p>

<ul>
<li>when the condition is met, <codel>if</codel> performs its statement <b>once</b>;</li>
<li><codel>while</codel> <b>repeats the execution</b> as long as the condition evaluates to <codel>true</codel>.</li>
</ul>
                    </div>
                    </div>
                </div> 
            </div></template></raw-html><!---->

                    <!--?lit$1951582493$--><ul>
<li>if you want <codel>while</codel> to execute <b>more than one</b> statement, you must (like with the <codel>if</codel> statement) use a block – take a look at the code in the editor;</li>
<li>an instruction or instructions executed inside the loop are called the <b>loop's body</b>;</li>
<li>if the condition is <codel>false</codel> (equal to zero) as early as when it’s tested for the first time, the <b>body is not executed</b> even once (note the analogy of not having to wash your hands if they’re not dirty);</li>
<li>the body should be able to change the condition value, because if the condition is true at the beginning, the body might <b>run continuously to infinity</b> (notice that washing changes the state of impurity).</li>
</ul>

                            <!--?lit$1951582493$--><br>

<p>Let’s go back to the sketch of the algorithm we made recently. We’re going to show you how to use this newly-learned loop. By the way, we’ll introduce one more thing to you.</p>

<p>So far we’ve declared variables in one place and assigned values to them in another. We can combine these two steps by <b>declaring the variable and assigning the value at the same time</b>.</p>

<p>We do this by adding the <codel>=</codel> sign followed by an expression whose value is assigned to the variable at the time of its creation. For example, if you need a variable that needs a value of zero, then you can do this:</p>

<br>

                        <!--?lit$1951582493$-->

                            <!--?lit$1951582493$--><p>As usual on such occasions, a new word arrives into our vocabulary: the part of the declaration placed on the right side of the <codel>=</codel> sign is called an <b>initiator</b>.</p>

<p>The initiator you saw before was a literal, but you can also use more complex expressions, like these ones:</p>

                                <!--?lit$1951582493$--><div tabindex="0" class="beforeHtml"><!--?lit$1951582493$--><p>Look at the code in the editor, and analyze it carefully:</p>

</ul>

<p>This program continuously takes numbers as input from the user until -1 is entered. During this process, it keeps track of the largest number entered. After the user finishes entering numbers, it prints the largest number among the input values. The use of -1 as a sentinel value signals the end of input.

                                <!--?lit$1951582493$--><div tabindex="0" class="beforeHtml"><!--?lit$1951582493$--><p>You already know that the <codel>while</codel> loop has two important features:</p>

<ul>
<li>it checks the condition <b>before</b> entering the body;</li>
<li>the body will not be entered if the condition is <codel>false</codel>.</li>
</ul>

<p>These two properties can often cause unnecessary complications. For this reason, there’s another loop in the “C” language which acts as a mirror image of the <codel>while</codel> loop. We say so because in that loop:</p>

<ul>
<li>the condition is <b>checked at the end</b> of body execution;</li>
<li>the loop's body is executed <b>at least once</b>, even if the condition is not met.</li>
</ul>

<p>This loop is called the <codel>do</codel> loop. Its simplified syntax is presented below:</p>

<p style="font-size:24px"><font face="Courier New"><b>do</b> 
<br>&nbsp;&nbsp;&nbsp;&nbsp;statement; 
<br><b>while</b>(condition);
<br>
<br><b>do</b> {
<br>&nbsp;&nbsp;&nbsp;&nbsp;statement_1; 
<br>&nbsp;&nbsp;&nbsp;&nbsp;statement_2; 
<br>&nbsp;&nbsp;&nbsp;&nbsp;:
<br>&nbsp;&nbsp;&nbsp;&nbsp;:
<br>&nbsp;&nbsp;&nbsp;&nbsp;statement_n; 
<br>} <b>while</b>(condition);</font></p>
<br>

<p>If you want to execute a body containing more than one statement, you must use a block.</p>

<p>Let’s go back to the program to search for the largest number. Firstly, we’ll use the <codel>do</codel> loop instead of <codel>while</codel> for teaching purposes. Secondly, we’ll remove the vulnerability involved in excessively trusting the user’s good intentions.</p>

<p>Our new program won’t be misled by entering the value of <codel>-1</codel> as the first number. The program is presented below:</p>

                            <div class="before-body-text" tabindex="0">
                            <!--?lit$1951582493$--><p>The last kind of loop available in the C language comes from the observation that sometimes it’s more important to count the <b>turns of a loop</b> (iterations) than to check the conditions. Imagine that a loop’s body needs to be executed exactly one hundred times. If you’d like to use the <i>while</i> loop to do that, it may look like this:</p>

<br>
                            </div>
                        
                        <div class="code__wrapper ">
                        <!--?lit$1951582493$-->
                            <button class="button-copy" aria-label="undefined">
                  <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="copy" class="svg-inline--fa fa-copy fa-w-14" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
                    <path fill="currentColor" d="M320 448v40c0 13.255-10.745 24-24 24H24c-13.255 0-24-10.745-24-24V120c0-13.255 10.745-24 24-24h72v296c0 30.879 25.121 56 56 56h168zm0-344V0H152c-13.255 0-24 10.745-24 24v368c0 13.255 10.745 24 24 24h272c13.255 0 24-10.745 24-24V128H344c-13.2 0-24-10.8-24-24zm120.971-31.029L375.029 7.029A24 24 0 0 0 358.059 0H352v96h96v-6.059a24 24 0 0 0-7.029-16.97z"></path>
                  </svg>
                </button><pre class="language-c " data-line=""><code><span class="token keyword">int</span> i<span class="token punctuation">;</span>
<span class="token operator">&lt;</span>b<span class="token operator">&gt;</span>i <span class="token operator">=</span> <span class="token number">0</span><span class="token punctuation">;</span><span class="token operator">&lt;</span><span class="token operator">/</span>b<span class="token operator">&gt;</span>

<span class="token keyword">while</span><span class="token punctuation">(</span><span class="token operator">&lt;</span>b<span class="token operator">&gt;</span>i <span class="token operator">&amp;</span>lt<span class="token punctuation">;</span> <span class="token number">100</span><span class="token operator">&lt;</span><span class="token operator">/</span>b<span class="token operator">&gt;</span><span class="token punctuation">)</span><span class="token punctuation">{</span>
	<span class="token comment">/* the body goes here */</span>
	<span class="token operator">&lt;</span>b<span class="token operator">&gt;</span>i<span class="token operator">++</span><span class="token punctuation">;</span><span class="token operator">&lt;</span><span class="token operator">/</span>b<span class="token operator">&gt;</span>
<span class="token punctuation">}</span></code></pre>
                        </div>
                        <!--?lit$1951582493$-->
                            <div class="after-body-text" tabindex="0">
                                <!--?lit$1951582493$--><br>

<p>We can distinguish three independent elements here:</p>

<ul>
<li>initialization of the counter (<codel>i = 0;</codel>);</li>
<li>checking the condition (<codel>i &lt; 100</codel>);</li>
<li>modifying the counter (<codel>i++;</codel>)</li>
</ul>

                            <!--?lit$1951582493$-->

<p>We can provide something like a generalized scheme for these kinds of loops – here it is:</p>

<p style="font-size:24px"><font face="Courier New"><b>initialization;</b>
<br>while(<b>checking</b>){
<br>&nbsp;&nbsp;&nbsp;&nbsp;/* the body goes here */
<br>&nbsp;&nbsp;&nbsp;&nbsp;<b>modyfying;</b>
<br>}</font></p>

<br>

<p>This way of coding the loop is very common so there’s a special, very brief way of writing it in the “C” language. All three decisive parts are gathered together. The loop is clear and easy to read. It’s called <codel>for</codel>:</p>

<br>
                            </div>
                        
                        <div class="code__wrapper ">
                        <!--?lit$1951582493$-->
                            <button class="button-copy" aria-label="undefined">
                  <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="copy" class="svg-inline--fa fa-copy fa-w-14" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
                    <path fill="currentColor" d="M320 448v40c0 13.255-10.745 24-24 24H24c-13.255 0-24-10.745-24-24V120c0-13.255 10.745-24 24-24h72v296c0 30.879 25.121 56 56 56h168zm0-344V0H152c-13.255 0-24 10.745-24 24v368c0 13.255 10.745 24 24 24h272c13.255 0 24-10.745 24-24V128H344c-13.2 0-24-10.8-24-24zm120.971-31.029L375.029 7.029A24 24 0 0 0 358.059 0H352v96h96v-6.059a24 24 0 0 0-7.029-16.97z"></path>
                  </svg>
                </button><pre class="language-c " data-line=""><code><span class="token keyword">for</span><span class="token punctuation">(</span>initialization<span class="token punctuation">;</span> checking<span class="token punctuation">;</span> modifying <span class="token punctuation">)</span><span class="token punctuation">{</span>
    <span class="token comment">/* the body goes here */</span>
<span class="token punctuation">}</span></code></pre>
                        </div>

                            <div class="before-body-text" tabindex="0">
                            <!--?lit$1951582493$--><br>

<p>The <codel>for</codel> loop has an interesting <b>singularity</b>. If we <b>omit any</b> of its three components, it’s <b>presumed that there is a <codel>1</codel> there instead</b>:</p>

<br>
                            </div>
                        
                        <div class="code__wrapper ">
                        <!--?lit$1951582493$-->
                            <button class="button-copy" aria-label="undefined">
                  <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="copy" class="svg-inline--fa fa-copy fa-w-14" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
                    <path fill="currentColor" d="M320 448v40c0 13.255-10.745 24-24 24H24c-13.255 0-24-10.745-24-24V120c0-13.255 10.745-24 24-24h72v296c0 30.879 25.121 56 56 56h168zm0-344V0H152c-13.255 0-24 10.745-24 24v368c0 13.255 10.745 24 24 24h272c13.255 0 24-10.745 24-24V128H344c-13.2 0-24-10.8-24-24zm120.971-31.029L375.029 7.029A24 24 0 0 0 358.059 0H352v96h96v-6.059a24 24 0 0 0-7.029-16.97z"></path>
                  </svg>
                </button><pre class="language-c " data-line=""><code><span class="token keyword">for</span><span class="token punctuation">(</span><span class="token operator">&lt;</span>b<span class="token operator">&gt;</span> <span class="token punctuation">;</span> <span class="token punctuation">;</span> <span class="token operator">&lt;</span><span class="token operator">/</span>b<span class="token operator">&gt;</span><span class="token punctuation">)</span> <span class="token punctuation">{</span>
    <span class="token comment">/* the body goes here */</span>
<span class="token punctuation">}</span></code></pre>
                        </div>
                        <!--?lit$1951582493$-->
                            <div class="after-body-text" tabindex="0">
                                <!--?lit$1951582493$--><br>

<p>One of the consequences of this is that a loop written in this way is <b>an infinite loop</b> (can you explain why?).</p>

<p>Well, the conditional expression is not there, so it’s automatically assumed to be <i>true</i>. And because the condition never becomes <i>false</i>, the loop becomes infinite.</p>

<br>

                    <div class="component-widge" tabindex="0">
                    <!--?lit$1951582493$--><p>So far, we’ve treated the body of the loop as an <b>indivisible</b> and <b>inseparable</b> sequence of instructions that are performed completely at every turn of the loop. However, the developer could be faced with the following choices:</p>

<ul>
<li>it appears that it’s <b>unnecessary to continue</b> the loop as a whole; we should refrain from executing the loop’s body and go further;</li>
<li>it appears that we need to <b>start the condition testing</b> without completing the execution of the current turn.</li>
</ul>

<p>The “C” language provides two special instructions for implementing both of these tasks. Let's say, for the sake of accuracy, that their existence in the language is not necessary – an experienced programmer can code any algorithm without such instructions. The famous Dutch computer scientist <b>Edsger Dijkstra</b> proved it in 1965. Additions which don’t improve the language’s power of expression, but only simplify the developer’s work, are sometimes called <b>syntactic candies</b>.</p>

<p>These two instructions are:</p>

<ul>
<li><codel>break</codel> - <b>exits the loop immediately</b> and unconditionally ends the loop’s operation; the program begins to execute the nearest instruction after the loop's body;</li>
<li><codel>continue</codel> – behaves as if the program has suddenly reached the end of the body; <b>the end of the loop’s body is reached</b>, the control variable is modified (in the case of for loops), and the condition expression is tested.</li>
</ul>

<p>Both these words are keywords.</p>

<p>Now we’ll show you two simple examples – we’ll show you their full power soon.</p>

                            <!--?lit$1951582493$--><h2>Level of difficulty</h2>
<p>Easy</p>

<h2>Objectives</h2>
<p>Familiarize the student with:</p>
<ul>
<li>Logic of loops - <i>while</i></li>
<li>Conditional statements</li>
<li>Getting input from the user</li>
<li>Integer numbers</li>
<li>Printing on screen</li>
</ul>


<h2>Scenario</h2>
<p>Write a program that takes two integer numbers and prints their sum. Do this until the user enters <codel>0</codel> (zero) (but print the last sum).</p>

<p>Additionally, if the user inputs <codel>99</codel> as the first number and <codel>0</codel> as the second number, just print <codel>Finish.</codel>, and end the program.</p>
<p>Use the <i>while</i> loop in your code.</p>

<p>Your version of the program must print the same result as the expected output.</p>

                            <div class="before-body-text" tabindex="0">
                            <!--?lit$1951582493$--><h2>Level of difficulty</h2>
<p>Easy</p>

<h2>Objectives</h2>
<p>Familiarize the student with:</p>
<ul>
<li>Logic of loops: <i>do - while</i></li>
<li>Getting input from the user</li>
<li>Printing characters on screen</li>
</ul>


<h2>Scenario</h2>
<p>Write a program that asks the user to enter a number. Then:</p>

<ul>
<li>the program should print the number of lines corresponding to the number inputted;</li>
<li>each line should contain the number of pairs of characters <codel>*#</codel> equal to the number of this line.</li>
</ul>
 
<p>The outputted "drawing" should be similar to the right half of a pyramid.</p>

<p>Your version of the program must print the same result as the expected output. To do this lab, you must use two <i>do-while</i> loops.</p>

<p>However:</p>
<ul>
<li>when the user inputs a number less than or equal to 1, the program should print only one line;</li>
<li>When the user inputs a number greater than 20, the program should print only twenty lines.</li>
</ul>


<h2>Sample Input</h2>

                            <div class="before-body-text" tabindex="0">
                            <!--?lit$1951582493$--><h2>Level of difficulty</h2>
<p>Easy</p>

<h2>Objectives</h2>
<p>Familiarize the student with:</p>
<ul>
<li>Logic of loops: <i>for</i></li>
<li>Inverting logic of <i>for</i> loops</li>
<li>Getting input from the user</li>
<li>Printing characters on screen</li>
</ul>


<h2>Scenario</h2>
<p>Write a program that asks the user to enter a number, and prints twice as many lines as the number inputted.</p>

<p>The first half of every other line contains one <codel>*</codel> character at the start, as many spaces as the number of this line (line numbers count from 0 in this task) and one <codel>*</codel> character at the end of the line. The second half is a mirror reflection of the first.</p>

<p>The outputted "drawing" should be similar to an arrowhead.</p>

<p>Your version of the program must print the same result as the expected output. To do this task, you should use two outer <i>for</i> loops and two inner <i>for</i> loops.</p>

<p>You shouldn't use any special formatting in the <codel>printf</codel> to print the spaces - just use the <i>for</i> loop.</p>

<p>Two exceptions:</p>
<ul>
<li>when the user inputs a number less than or equal to 1, the program doesn't print any line.</li>
<li>when the user inputs a number greater than 20, the program prints only forty lines.</li>
</ul>
<p></p>

<h2>Sample input</h2>
