                    <!--?lit$432842251$--><p>An <b>operator</b> is a symbol of the programming language which is able to <b>operate</b> on the values.</p>

<p>For example, one assignment operator is the <codel>=</codel> sign. You already know that it can assign values to variables.</p>

<p>Let’s take a look at some other operators available in the “C” language and learn which rules govern their use and how to interpret the operations they perform.</p>

<p>We’ll begin with the operators associated with widely recognizable <b>arithmetic operations</b>.</p>

<p>The order of their appearance is not accidental. We’ll talk more about it at the end.</p>

                            <!--?lit$432842251$--><p>The same dual nature is expressed by the “<codel>+</codel>” operator, which can be also used as a unary operator – its role is to <b>preserve</b> the sign. Take a look at the snippet.</p>

                            <!--?lit$432842251$--><p>The <b>remainder</b> operator (or <b>modulus</b> as it is often called) is quite a peculiar operator, because it has no equivalent among traditional arithmetic operators. Its graphical representation in the “C” language is the following character: <codel>%</codel> (percent), which may look a bit confusing. It’s a binary operator and both arguments cannot be floats (don't forget this!).</p>

<p>Look at the example:</p>

<br>

                  </svg>
                </button><pre class="language-c " data-line=""><code><span class="token keyword">int</span> i<span class="token punctuation">,</span>j<span class="token punctuation">,</span>k<span class="token punctuation">;</span>

j <span class="token operator">=</span> <span class="token number">5</span><span class="token punctuation">;</span>

k <span class="token operator">=</span> i <span class="token operator">%</span> j<span class="token punctuation">;</span></code></pre>

                        <!--?lit$432842251$-->
                            <div class="before-body-text" tabindex="0">
                            <!--?lit$432842251$--><p>So far, we’ve treated each operator as if it has no connection with the others. Obviously, such an ideal and simple situation is a rarity in real programming. Also, we very often find more than one operator in one <b>expression</b>, and then our presumption is no longer so obvious. Consider the following expression.</p>

<br>
                            </div>
                        
                        <div class="code__wrapper ">
                        <!--?lit$432842251$-->
                            <pre class="no-syntax " data-line=""><code><span>2 + 3 * 5</span></code></pre>
                        </div>
                        <!--?lit$432842251$-->
                            <div class="after-body-text" tabindex="0">
                                <!--?lit$432842251$--><br>

<p>If your memory hasn't failed you, you should know from school that multiplication <b>precedes</b> addition. You surely remember that you should multiply 3 by 5 and, keeping the 15 in your memory, add it to 2, thus getting the result of 17. The phenomenon that causes some operators to act before others is known as the <b>hierarchy of priorities</b>.</p>

<p>The “C” language precisely defines the <b>priorities</b> of all operators and assumes that operators of a larger (higher) priority perform their operations before the operators with a lower priority. So, if we know that <codel>*</codel> has a higher priority than <codel>+</codel>, the computation of the final result is pretty obvious.</p>
                            </div>
                        
                    </div>

                        <!--?lit$432842251$-->
                            <div class="before-body-text" tabindex="0">
                            <!--?lit$432842251$--><p>The <b>binding</b> of the operator determines the order of the computations performed by some operators with equal priority, put side by side in one expression. Most operators in the “C” language have the <b>left-sided</b> binding, which means that the calculation of the expression shown here is conducted from <b>left to right</b>, i.e., 3 will be added to 2 and 5 will be added to the result.</p>

<br>
                            </div>
                        
                        <div class="code__wrapper ">
                        <!--?lit$432842251$-->
                            <pre class="no-syntax " data-line=""><code><span>2 + 3 + 5</span></code></pre>
                        </div>
                        <!--?lit$432842251$-->
                            <div class="after-body-text" tabindex="0">
                                <!--?lit$432842251$--><br>

<p>You’re probably snorting at this point and saying that all children know perfectly well that addition is commutative and the order in which the additions are performed has no meaning. Yes, you're right, but not quite.</p>

<p>Additions performed by computers are not always commutative. Really. We’ll show you this phenomenon later. Be patient.</p>

                            <div class="before-body-text" tabindex="0">
                            <!--?lit$432842251$--><p>Since you're new to “C” language operators, it’s not a good idea to show you the complete list of the operators' priorities right now. Instead, we’ll show you a truncated version and expand it consistently as we introduce new operators. The table now looks as follows:</p>

<div class="custom-table-outer"><table style="width:100%">
<tbody><tr>
  <td><codel>+</codel>, <codel>-</codel></td>
  <td><b>unary</b></td>
</tr>
<tr>
  <td><codel>*</codel>, <codel>/</codel>, <codel>%</codel></td>
  <td><b></b></td>
</tr>
<tr>
  <td><codel>+</codel>, <codel>-</codel></td>
  <td><b>binary</b></td>
</tr>
</tbody></table></div> 

<p>Note: we list the operators in order from the <b>highest</b> to the <b>lowest</b> priority.</p>

<br><br>

<p>We want to check if you’ve understood the concept of binding successfully. Try to work through the following expression:</p>

<br>
                            </div>

                        </div>
                        <!--?lit$432842251$-->
                            <div class="after-body-text" tabindex="0">
                                <!--?lit$432842251$--><br>

<p>Both operators (<codel>*</codel> and <codel>%</codel>) have the same priority, so the result could be guessed only when you know the binding direction.</p>

<p>Do you know the result? Click <i>Check</i> below to see if you were right:</p>

                                <!--?lit$432842251$--><br>

<p><b>Effect:</b></p>

<p>Return the original (unchanged) variable's value and then increment/decrement the variable by one.</p>

<br>

<p>This behavior justifies the presence of the prefix <i>pre-</i> (before) and <i>post-</i> (after) in the operators’ names: <i>pre-</i> because the variable is modified <b>first</b> and then its value is <b>used</b>; <i>post-</i> because the variable's value is <b>used</b> and then <b>modified</b>.</p>

                            <!--?lit$432842251$--><p>Take a look at two simple examples.</p>

<br>
                            </div>
                        
                        <div class="code__wrapper ">
                        <!--?lit$432842251$-->
                            <button class="button-copy" aria-label="undefined">
                  <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="copy" class="svg-inline--fa fa-copy fa-w-14" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">

                  </svg>
                </button><pre class="language-c " data-line=""><code><span class="token keyword">int</span> i<span class="token punctuation">,</span>j<span class="token punctuation">;</span>

i<span class="token operator">=</span><span class="token number">1</span><span class="token punctuation">;</span>
j<span class="token operator">=</span>i<span class="token operator">++</span><span class="token punctuation">;</span></code></pre>
                        </div>
                        <!--?lit$432842251$-->
                            <div class="after-body-text" tabindex="0">
                                <!--?lit$432842251$--><br>

<p>First, the variable <codel>i</codel> is set to <codel>1</codel>. In the second statement, we’ll see the following steps:</p>

<ul>
<li>the value of <codel>i</codel> will be taken (as we use the <i>post-incrementation</i>);</li>
<li>the variable <codel>i</codel> will be increased by <codel>1</codel>.</li>
</ul>

<p>In effect, <codel>j</codel> will receive the value of <codel>1</codel> and <codel>i</codel> the value of <codel>2</codel>.</p>
                            </div>

j<span class="token operator">=</span><span class="token operator">++</span>i<span class="token punctuation">;</span></code></pre>

                            <div class="before-body-text" tabindex="0">
                            <!--?lit$432842251$--><p>Look carefully at this program. Let’s trace its execution step by step.</p>

<br>
                            </div>
                        
                        <div class="code__wrapper ">
                        <!--?lit$432842251$-->
                            <button class="button-copy" aria-label="undefined">
                  <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="copy" class="svg-inline--fa fa-copy fa-w-14" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">

                  </svg>
                </button><pre class="language-c " data-line=""><code><span class="token keyword">int</span> i<span class="token punctuation">,</span>j<span class="token punctuation">;</span>

i <span class="token operator">=</span> <span class="token number">4</span><span class="token punctuation">;</span>
j <span class="token operator">=</span> <span class="token number">2</span> <span class="token operator">*</span> i<span class="token operator">++</span><span class="token punctuation">;</span>
i <span class="token operator">=</span> <span class="token number">2</span> <span class="token operator">*</span> <span class="token operator">--</span>j<span class="token punctuation">;</span></code></pre>
                        </div>
                        <!--?lit$432842251$-->
                            <div class="after-body-text" tabindex="0">
                                <!--?lit$432842251$--><br>

<ol>
<li>The <codel>i</codel> variable is assigned the value of <codel>4</codel>;</li>
<li>We take the original value of <codel>i</codel> (<codel>4</codel>), multiply it by <codel>2</codel>, assign the result (<codel>8</codel>) to <codel>j</codel> and eventually (post-)increment the <codel>i</codel> variable (it equals <codel>5</codel> now);</li>
<li>We (pre-)decrement the value of <codel>j</codel> (it equals <codel>7</codel> now); this reduced value is taken and multiplied by <codel>2</codel> and the result (<codel>14</codel>) is assigned to the variable <codel>i</codel>.</li>
</ol>

<br>

<p>What else do you need to know about the new operators? Firstly, their priority is quite high – higher than the “<codel>*</codel>”, “<codel>/</codel>” and “<codel>%</codel>” operators. Secondly, their binding depends on whether you use the prefix or postfix version. The prefix version operators have a right-to-left binding, while the postfix operators bind from left to right.</p>

<p>Our priority table now reads as follows:</p>

</tr>
<tr>
  <td><codel>=</codel></td>
  <td></td>
</tr>
</tbody></table></div>

                            <!--?lit$432842251$--><h2>Level of difficulty</h2>
<p>Easy</p>

<h2>Objectives</h2>
<p>Familiarize the student with:</p>
<ul>
<li>Using operators,</li>
<li>Building simple expressions,</li>
<li>Translating verbal description into programming language</li>
</ul>

<h2>Scenario</h2>
<p>Take a look at the code we've provided in the editor: it assigns two integer values, manipulates them and finally outputs the <codel>result</codel> and <codel>bigresult</codel> variables.</p>

<p>The problem is that the manipulations have been described using natural language, so the code is completely useless now.</p>
<p>We want you to act as an intelligent (naturally!) compiler and to translate the formula into a real "C" code notation.</p>
<p>Test your code using the data we've provided.</p>

                            <!--?lit$432842251$--><h2>Level of difficulty</h2>
<p>Easy</p>


<h2>Objectives</h2>
<p>Familiarize the student with:</p>
<ul>
<li>Fixing errors in a program</li>
<li>Doing simple math with operators, variables and numbers</li>
<li>Order of operations</li>
<li>Use of parentheses to change the order of operations</li>
<li>Printing on screen</li>
</ul>


<h2>Scenario</h2>
<p>Check the program in the editor. Find all possible compilation errors and logic errors. Fix them, but do not change any numeric values.</p>

<p>However, you may use parentheses (you can add or remove them). Your version of the program must print the same result as the expected output.</p>

<p>Before you use your the, try to find the errors only by manual code analysis.</p>

                            <!--?lit$432842251$--><h2>Level of difficulty</h2>
<p>Easy</p>


<h2>Objectives</h2>
<p>Familiarize the student with:</p>
<ul>
<li>Fixing errors in a program</li>
<li>Doing simple math with operators, variables and numbers</li>
<li>Order of operations</li>
<li>Use of parentheses to change the order of operations</li>
<li>Printing on screen</li>
</ul>

<h2>Scenario</h2>
<p>Check the program in the editor. Find all possible compilation errors and logic errors. Fix them, but do not change any numeric values.</p>

<p>However, you can use parentheses (you can add or remove them). Your version of the program must print the same result as the expected output.</p>

<p>Before you use the compiler, try to find the errors only by manual code analysis.</p>

                            <!--?lit$432842251$--><h2>Level of difficulty</h2>
<p>Easy</p>

<h2>Objectives</h2>
<p>Familiarize the student with:</p>
<ul>
<li>Fixing errors in a program</li>
<li>Doing simple math with operators, variables and numbers</li>
<li>Order of operations</li>
<li>Use of parentheses to change the order of operations</li>
<li>Printing on screen</li>
</ul>

<h2>Scenario</h2>
<p>Check the program in the editor. Find all possible compilation errors and logic errors. Fix them, but do not change any numeric values.</p>

<p>However, you can use parentheses (you can add or remove them). Your version of the program must print the same result as the expected output.</p>

<p>Before you use the compiler, try to find the errors only by manual code analysis.</p>

                            <!--?lit$432842251$--><h2>Level of difficulty</h2>
<p>Easy</p>


<h2>Objectives</h2>
<p>Familiarize the student with:</p>
<ul>
<li>Doing simple math with operators, variables and numbers</li>
<li>Order of operations</li>
<li>Printing on screen</li>
</ul>

<h2>Scenario</h2>
<p>Complete the program in the editor. Compute the accrued amount of money with a starting value of 100 and an annual interest rate of 1.5%. Compute and print the results for the first three years.</p>

<p>Your version of the program must print the same result as the expected output for each year. Compute each annual value on the basis of the previous year's value.</p>

                            <!--?lit$432842251$--><h2>Level of difficulty</h2>
<p>Easy</p>


<h2>Objectives</h2>
<p>Familiarize the student with:</p>
<ul>
<li>Using operators,</li>
<li>Using shortcut and pre/post increment/decrement operators,</li>
<li>Building simple expressions,</li>
<li>Translating verbal description into programming language</li>
</ul>


<h2>Scenario</h2>
<p>Take a look at the code we've provided in the editor: it assigns two integer values, manipulates them and finally outputs the <codel>result</codel> and <codel>bigresult</codel> variables.</p>

<p>The problem is that the manipulations have been described using natural language, so the code is completely useless now.</p>

<p>We want you to act as an intelligent compiler and to translate the formula into real "C" code notation. It's the same code as the one we've provided in one of the previous labs, but this time, try to use pre/post 
and short-cut operators - they fit perfectly into some of the steps.</p>

<p>Test your code using the data we've provided.</p>
