<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codara — Aprende programando</title>
    <meta name="description" content="Plataforma interactiva de cursos de programación con editor en línea, laboratorios y pruebas automáticas." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <!-- ⚡ Apply theme BEFORE React renders to avoid flash -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('codara-theme')
          if (t === 'light') document.documentElement.setAttribute('data-theme', 'light')
        } catch (e) {}
      })()
    </script>
    <!-- GitHub Pages SPA: restaurar ruta desde ?p= -->
    <script>
      (function () {
        var redirect = sessionStorage.redirect
        delete sessionStorage.redirect
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect)
        }
        // También manejar ?p= del 404.html
        var url = new URL(location.href)
        var p = url.searchParams.get('p')
        if (p) {
          var q = url.searchParams.get('q')
          var newPath = '/Codara' + p + (q ? '?' + q.replace(/~and~/g, '&') : '') + location.hash
          history.replaceState(null, null, newPath)
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
