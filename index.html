<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codara — Aprende programando</title>
    <meta name="description" content="Plataforma interactiva de cursos de programación con editor en línea, laboratorios y pruebas automáticas." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <!-- ⚡ Apply theme BEFORE React renders to avoid flash -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('codara-theme')
          if (t === 'light') document.documentElement.setAttribute('data-theme', 'light')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
