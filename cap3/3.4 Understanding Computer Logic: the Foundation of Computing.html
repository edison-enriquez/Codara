                    <!--?lit$1951582493$--><p>Have you noticed that the conditions we’ve used so far have been very simple, not to say – quite primitive? The conditions we use in real life are much more complex. Let's look at the sentence:</p>

<p><i>If we have some free time, and the weather is good, we will go for a walk.</i></p>

<p>We’ve used the conjunction <i>and</i>, which means that going for a walk depends on the simultaneous fulfillment of the two conditions. In the language of logic, the connection of conditions is called a <b>conjunction</b>. And now another example:</p>

<p><i>If you are in the mall or I am in the mall, one of us will buy a gift for Mom.</i></p>

<p>The appearance of the word <i>or</i> means that the purchase depends on at least one of these conditions. In logic terms, this is called a <b>disjunction</b>.</p>

<p>Therefore, the “C” language must have operators to build conjunctions and disjunctions. Without them, the expressive power of the language would be substantially weakened. We call these <b>logical operators</b>.</p>

<br>

                            <!--?lit$1951582493$--><h1></h1>

<p>The logical conjunction operator in the “C” language is a digraph <codel>&amp;&amp;</codel> (<i>ampersand ampersand</i>).</p>

<p>This is a binary operator with a priority lower than the comparison operators. It allows us to code complex conditions without the use of parentheses like this one:</p>

                            <!--?lit$1951582493$--><p>The result provided by the <codel>&amp;&amp;</codel> operator can be determined on the basis of the truth table. If we consider the conjunction of:</p>

<br>
                            </div>
                        
                        <div class="code__wrapper ">
                        <!--?lit$1951582493$-->
                            <button class="button-copy" aria-label="undefined">
                  <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="copy" class="svg-inline--fa fa-copy fa-w-14" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">

                  </svg>
                </button><pre class="language-c " data-line=""><code>left <span class="token operator">&amp;&amp;</span> right</code></pre>
                        </div>
                        <!--?lit$1951582493$-->
                            <div class="after-body-text" tabindex="0">
                                <!--?lit$1951582493$--><br>

<p>the set of possible values of arguments and corresponding values of the conjunction looks as follows:</p>

<div class="custom-table-outer"><table style="width:100%">

<tr>

                    <div class="component-widge" tabindex="0">
                    <!--?lit$1951582493$--><p>The disjunction operator is the digraph <codel>| |</codel> (<i>bar bar</i>). It’s a binary operator with a lower priority than <codel>&amp;&amp;</codel> (just like “<codel>+</codel>” compared to “<codel>*</codel>”).
Its truth table looks as follows:</p>

<div class="custom-table-outer"><table style="width:100%">
<tbody><tr>
  <td><b>left</b></td>
  <td><b>right</b></td>
  <td><b>left | | right</b></td>
</tr>
<tr>
  <td>false</td>
  <td>false</td>
  <td>false</td>
</tr>
<tr>
  <td>false</td>
  <td>true</td>
  <td>true</td>
</tr>
<tr>
  <td>true</td>
  <td>false</td>
  <td>true</td>
</tr>
<tr>
  <td>true</td>
  <td>true</td>
  <td>true</td>
</tr>
</tbody></table></div> 

<p>In addition, there’s another operator that can be used to construct conditions. It’s a unary operator performing a <b>logical negation</b>. Its operation is simple: it turns true into false and false into true. This operator is written as a single character <codel>!</codel> (<i>exclamation mark</i>) and its priority is very high: the same as the increment and decrement operators.</p>

<p>Its truth table is truly simple:</p>

<div class="custom-table-outer"><table style="width:100%">
<tbody><tr>
  <td><b>arg</b></td>
  <td><b>!arg</b></td>
</tr>
<tr>
  <td>false</td>
  <td>true</td>
</tr>
<tr>
  <td>true</td>
  <td>false</td>
</tr>
</tbody></table></div> 

<br>

<p><i>The negation of a conjunction is the disjunction of the negations.

                        <!--?lit$1951582493$-->
                            <div class="before-body-text" tabindex="0">
                            <!--?lit$1951582493$--><p>Logical operators take their arguments as a whole, <b>regardless of how many bits they contain</b>. The operators are aware only of the value: <codel>0</codel> (when all the bits are reset) means <codel>false</codel>; not <codel>0</codel> (when at least one bit is set) means <codel>true</codel>. The result of their operations is one of the values: <codel>0</codel> or <codel>1</codel>. This means that the following snippet:</p>

<br>
                            </div>
                        
                        <div class="code__wrapper ">
                        <!--?lit$1951582493$-->
                            <button class="button-copy" aria-label="undefined">
                  <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="copy" class="svg-inline--fa fa-copy fa-w-14" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
                    <path fill="currentColor" d="M320 448v40c0 13.255-10.745 24-24 24H24c-13.255 0-24-10.745-24-24V120c0-13.255 10.745-24 24-24h72v296c0 30.879 25.121 56 56 56h168zm0-344V0H152c-13.255 0-24 10.745-24 24v368c0 13.255 10.745 24 24 24h272c13.255 0 24-10.745 24-24V128H344c-13.2 0-24-10.8-24-24zm120.971-31.029L375.029 7.029A24 24 0 0 0 358.059 0H352v96h96v-6.059a24 24 0 0 0-7.029-16.97z"></path>
                  </svg>
                </button><pre class="language-c " data-line=""><code><span class="token keyword">int</span> i<span class="token punctuation">,</span> j<span class="token punctuation">;</span>
j <span class="token operator">=</span> <span class="token operator">!</span><span class="token operator">!</span>i<span class="token punctuation">;</span></code></pre>
                        </div>
                        <!--?lit$1951582493$-->
                            <div class="after-body-text" tabindex="0">
                                <!--?lit$1951582493$--><br>

<p>will assign a value of <codel>1</codel> to the <codel>j</codel> variable if <codel>i</codel> is not zero; otherwise, it will be <codel>0</codel>.</p>

<br>

<p>However, there are four operators that allow you to manipulate single bits of data. We call them <b>bitwise operators</b>.</p>

<p>They cover all the operations we mentioned before in the logical context and one additional operator. This is the <i>xor (exclusive or)</i> and is denoted as <codel>^</codel> (caret). Here are all of them:</p>

<div class="custom-table-outer"><table style="width:100%">
<tbody><tr>
  <td><codel>&amp;</codel>&nbsp;&nbsp;&nbsp;(ampersand)</td>
  <td>bitwise conjunction</td>
</tr>
<tr>
  <td><codel>|</codel>&nbsp;&nbsp;&nbsp;(bar)</td>
  <td>bitwise disjunction</td>
</tr>
<tr>
  <td><codel>~</codel>&nbsp;&nbsp;&nbsp;(tilde)</td>
  <td>bitwise negation</td>
</tr>
<tr>
  <td><codel>^</codel>&nbsp;&nbsp;&nbsp;(caret)</td>
  <td>bitwise exclusive or</td>
</tr>
</tbody></table></div>

                                <!--?lit$1951582493$--><!----><raw-html modelid="65687cf7d8d5cb03c4d77b7c" class="is-full" is-touch="false" fullscreen="true" device="small" browser="Chrome" os="windows" dir="ltr" location="page" theme="light" orientation="portrait" themetype="article-base-theme" sgpulse-type="component"><template shadowrootmode="open"><!---->

                        <base-view type="component" lowercase_component="rawHtml" model="[object Object]" customclass="" is-touch="false" fullscreen="true" device="small" browser="Chrome" os="windows" dir="ltr" location="page" theme="light" orientation="portrait" themetype="article-base-theme"><template shadowrootmode="open"><!---->

                    <div class="component-widge" tabindex="0">
                    <!--?lit$1951582493$--><p>Let's make it easier:</p>

<ul>
<li><codel>&amp;</codel> requires exactly two “1s” to provide “1” as the result</li>
<li><codel>|</codel> requires at least one “1” to provide “1” as the result</li>
<li><codel>^</codel> requires only one “1” to provide “1” as the result</li>
<li><codel>~</codel> (is one argument and) requires “0” to provide “1” as the result</li>
</ul>

<p>But take note: arguments of these operators <b>must be integers</b> (<codel>int</codel> as well as <codel>long</codel>, <codel>short</codel> or <codel>char</codel>); we must not use <codel>float</codel>s here.</p>

<p>The difference in the operation of the logical and bit operators is important: the logical operators do not penetrate into the bit level of its argument. They’re only interested in the final integer value.</p>

<p>Bitwise operators are stricter: <b>they deal with every bit separately</b>. If we assume that the <codel>int</codel> variable occupies 32 bits, you can imagine the bitwise operation as a 32-fold evaluation of the logical operator for each pair of bits of the arguments. Obviously, this analogy is somewhat imperfect, as in the real world all these 32 operations are performed at the same time.</p>

<br>

<div class="custom-table-outer"><table style="width:100%">
<tbody><tr>
  <td><b>left</b></td>
  <td><b>right</b></td>
  <td><b>left&amp;right</b></td>
  <td><b>left|right</b></td>
  <td><b>left^right</b></td>
</tr>
<tr>
  <td>0</td>
  <td>0</td>
  <td>0</td>
  <td>0</td>
  <td>0</td>
</tr>
<tr>
  <td>0</td>
  <td>1</td>
  <td>0</td>
  <td>1</td>

                            <!--?lit$1951582493$--><p>Each of the previous two-argument operators can be used in their abbreviated forms. The following notations are equivalent, respectively:</p>

<div class="custom-table-outer"><table style="width:100%">
<tbody><tr>
  <td>x = x &amp; y;</td>
  <td>x&amp; = y;</td>
</tr>
<tr>

  <td>x| = y;</td>
</tr>
<tr>
  <td>x = x ^ y;</td>
  <td>x^ = y;</td>
</tr>
</tbody></table></div> 

<br>

<p>We'll now show you what bitwise operators are good for. Imagine that you’re a developer who has to write an important piece of an operating system. You’ve been told that you have to use a variable declared in the following way:</p>

                    <div class="component-widge" tabindex="0">
                    <!--?lit$1951582493$--><p>The “C” language offers yet another operation relating to single bits: <b>shifting</b>. This is applied only to <b>integer</b> values and you mustn't use floats as arguments for it. You use this operation very often quite unconsciously. How do we multiply any number by 10? Take a look:</p>

<p style="font-size:24px">12345 × 10 = 123450</p>

<p>As you can see, multiplying by ten is in fact a shift of all the digits to the left and filling the resulting gap with a “0”. Division by 10? Let's look:</p>

<p style="font-size:24px">12340 ÷ 10 = 1234</p>

<p>Dividing by 10 is nothing more than shifting the digits to the right.</p>

<p>The same kind of operation is performed by the computer, but with one difference: as 2 is the base for binary numbers (not 10), shifting a value one bit to the left corresponds to multiplying it by 2; respectively, shifting one bit to the right is like dividing by 2 (notice that the right-most bit is lost).</p>

<br>

<p>Bit shifting can be:</p>

<ul>
<li>Logical, if all the bits of the variable are shifted; shifting takes place when you apply it to the unsigned integers;</li>
<li>Arithmetic, if the shift omits the <b>sign bit</b> – in two's complement notation, the role of the <b>sign bit</b> is played by the <b>highest bit</b> of a variable; if it’s equal to "1", the value is treated as a negative; this means than the arithmetic shift cannot change the sign of the shifted value.</li>
</ul>

<p>The shift operators in the “C” language are a pair of digraphs, <codel>&lt;&lt;</codel> and <codel>&gt;&gt;</codel>:</p>

<p style="font-size:24px">Value <b>&lt;&lt;</b> Bits
<br>
Value <b>&gt;&gt;</b> Bits</p>

<p>clearly suggesting in which direction the shift will act. The left argument of these operators is the integer value whose bits are shifted. The right argument determines the size of the shift. This shows that this operation is certainly not commutative.</p>

<p>The priority of these operators is very high. You'll see them in the updated table of priorities which we’ll show you at the end of this section.</p>

                    <!--?lit$1951582493$--><h2>Level of difficulty</h2>
<p>Easy</p>

<h2>Objectives</h2>
<p>Familiarize the student with:</p>
<ul>
<li>Fixing errors in a program</li>
<li>Integer numbers</li>
<li>Printing on screen</li>
</ul>

<h2>Scenario</h2>
<p>Write a program that computes and prints whether or not a given year is a leap year. </p>

<p>A leap year is a year that is exactly (without a remainder) divisible by four, except for years that are exactly divisible by 100, but these years are leap years if they are exactly divisible by 400.</p>

<p>Use the <i>modulo</i> operator and some logic operators in your program and try to write only one condition (of course you can now use the <i>else</i> keyword).</p>

<p>Your version of the program must print the same result as the expected output. 
</p>

                    <!--?lit$1951582493$--><h2>Level of difficulty</h2>
<p>Easy</p>

<h2>Objectives</h2>
<p>Familiarize the student with:</p>
<ul>
<li>Dealing with single bits and groups of bits</li>
<li>Taking input from the user</li>
<li>Integer numbers</li>
<li>Printing on screen</li>
</ul>

<h2>Scenario</h2>
<p>A nibble is just a four-bit aggregation - we can also call it a half-byte. </p>

<p>Sometimes we use the terms <i>low nibble</i> and <i>high nibble</i> to denote nibbles containing less significant bits (low nibble - L) and more significant bits (high nibble - H) within a byte.</p>

<p>Write a program that asks the user for one integer number smaller than 256, and prints both nibbles of the number. You don't have to verify the input.</p>

<p>Your version of the program must print the same result as the expected output. 
</p>
