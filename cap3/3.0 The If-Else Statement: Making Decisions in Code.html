                    <div class="component-widge" tabindex="0">
                    <!--?lit$1951582493$--><p>We concluded our last discussion on conditional statements with a promise that we would introduce a more complex and flexible form soon. We started our tale with a simple phrase which read: <i>If the weather is good, we will go for a walk</i>.</p>

<p>Note – there is not a word about what will happen if it rains cats and dogs. We only know that we certainly won’t go outdoors, but what we would do instead isn’t mentioned. We may want to plan something in case of bad weather, too.</p>

<p>We can say, for example: <i>If the weather is good we will go for a walk, otherwise we will go to a theater</i>. </p>

<p>This sentence makes our plans more resistant to the whims of fate – we know what we’ll do if the conditions are met and we know what we we’ll do if not everything goes our way. In other words, we have a plan “B”.</p>

<p>Luckily, the “C” language allows us to express alternative plans. We do this with a second, slightly more complex form of the conditional statement – here it is:</p>

                    <!--?lit$1951582493$--><br>
<p>Thus, we have a new word: <codel>else</codel> – this is a keyword (<i>reserved word</i>). A statement which begins with <codel>else</codel> tells us <b>what to do if the condition specified for the <codel>if</codel> is not met</b>.</p>

<p>So the <i>if-else</i> execution goes as follows:</p>

<ul>
<li>if the condition is “<codel>true</codel>” (its value is not equal to zero) the <codel>perform_if_condition_true</codel> is executed and the conditional statement comes to an end;</li>
<li>if the condition is “<codel>false</codel>” (its value is equal to zero) the <codel>perform_if_condition_false</codel> is executed and the conditional statement comes to an end;</li>
</ul>

                            <!--?lit$1951582493$--><p>As well as in other simplified forms of this instruction, like the ones we’ve already encountered, both <codel>if</codel> and <codel>else</codel> may contain <b>only one statement</b>. If you’re going to write more than one instruction, you have to use a block, as in the example below:</p>

<p>Now let’s discuss two special cases of the conditional statement. First, consider the surprising case when the instruction placed after the <codel>if</codel> is another <codel>if</codel>.</p>

<p>Listen to what we have planned for this Sunday: <i>If the weather is fine, we’ll go for a walk. If we find a nice restaurant, we’ll have lunch there. Otherwise, we’ll eat a sandwich. If the weather is poor, we'll go to the theater. If there are no tickets, we’ll go shopping in the nearest mall.</i></p>

                        <!--?lit$1951582493$-->
                            <div class="before-body-text" tabindex="0">
                            <!--?lit$1951582493$--><p>Let’s examine two important points:</p>

<ul>
<li>such a use of the <codel>if</codel> statement is known as <b>nesting</b>; remember that every <codel>else</codel> refers to the closest former <codel>if</codel> which did not match any other <codel>else</codel>; we need to know this to determine how the <codel>if</codel>s and <codel>else</codel>s pair up;</li>
<li>consider how the <b>indentation</b> improves readability and emphasizes the nesting of inner conditional statements.</li>
</ul>


<p>The second special case slightly resembles nesting, but there aren’t many more similarities.</p>

<p>Again, we’ll change our plans and express them as follows: <i>If the weather is fine, we'll go for a walk, otherwise if we get tickets, we’ll go to the theatre, otherwise if there are free tables at the restaurant, we’ll go for lunch; if everything fails we’ll return home and play chess.</i></p>

<p>Did you notice how many different alternatives there are? Let’s write the same scenario in the “C” language:</p>

<br>
                            </div>
                        
                        <div class="code__wrapper ">

<p>Familiarize the student with:</p>
