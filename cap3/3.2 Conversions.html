                    <!--?lit$1951582493$--><p>A multitude of data types in the “C” language may cause some confusion, especially when different data types appear <b>together inside one expression</b>. Now it’s time to talk about this thoroughly. Let’s start with a definition:</p>

<p>Changing the type of the data (perhaps combined with a change of its value, which may be caused by a loss of accuracy) is called a <b>conversion</b>.</p>

<p>The “C” language knows two types of conversions:</p>

<ul>
<li><b>implicit conversions</b>, which work according to language rules and are not specified in the code in any visible way; their operation is silent and automatic;</li>
<li><b>explicit conversions</b> carried out at the developer's request; the developer should insert them explicitly inside the code indicating which value should be converted and into which resulting type.</li>
</ul>

<p>Implicit conversions are performed at run-time according to these strict rules. The rules are applied in the order below until all the data used in the particular expression has <b>the same type</b> – this condition is very important!</p>

<ul>
<li>data of type <codel>char</codel> or <codel>short int</codel> will be converted to type <codel>int</codel> (this is called an <b>integer promotion</b>);</li>
<li>if there is any value of type <codel>float</codel> in the expression, the other data will be converted to <codel>float</codel>;</li>
<li>if there’s any value of type <codel>double</codel> in the expression, the other data will be converted to <codel>double</codel>;</li>
<li>if there’s any value of type <codel>long int</codel> in the expression, the other data will be converted to <codel>long int</codel>.</li>
</ul>

<p>If the context in which the expression is calculated requires another type than the one resulting from the implicit conversions, the last conversion is done to the type requested by the context.</p>

<br>

                    <!--?lit$1951582493$--><br>
<p>You should be able to write a program that searches for the largest of four, five, six or even ten numbers. You already know the format, so extending the program isn’t particularly complex.</p>

<p>But what happens if we ask you to write a program to search for the largest of a hundred numbers? Can you imagine the code?</p>

<ul>
<li>You’d need hundreds of declarations of type <codel>int</codel> variables. If you think you can cope with that, then try to imagine searching for the greatest of a million numbers;</li>
<li>Imagine the code that contains 99 conditional statements and a hundred invocations of the <codel>scanf</codel> function.</li>
</ul>

<p>Let’s ignore the “C” language for a moment and try to analyze the problem without thinking about the programming. In other words, let’s try to write the <b>algorithm</b>, and when we’re happy with that, we'll implement it.</p>

<p>We’ll use a kind of notation which isn’t a programming language at all (it can be neither compiled nor executed), but it is formalized, concise and readable. We call it <b>pseudo-code</b>.</p>

<p>In the editor there is an example of pseudo-code. What’s happening in it?</p>

<p>Firstly, we can simplify our program if, at the very beginning of the code, we assign the variable max with a value which is smaller than any of the numbers entered. We’ll use <i>-999999999</i>.</p>

<p>Secondly, we assume that our algorithm doesn’t know in advance how many numbers will be delivered to the program. We expect the user will enter as many numbers as she/he wants – the algorithm will work well with either a hundred or a thousand numbers. How do we do that? We make a deal with the user: when the value <codel>-1</codel> is entered, it’ll be a sign that there is no more data and the program should end its work. Otherwise, if the value entered is not equal to <codel>-1</codel>, the program will read another number, and so on.</p>

<p>The trick is based on the assumption that any part of the code <b>can be performed more than once</b> – in fact, as many times as you need.</p>

<p>Performing a certain part of the code more than once is called a <b>loop</b>. You probably know what this means already. See, steps 2 through 5 make a loop. Can we use a similar structure in the program written in the “C” language? Yes, we can, and we’ll tell you all about it soon.</p>

                            <!--?lit$1951582493$--><h2>Level of difficulty</h2>
<p>Easy</p>


<h2>Objectives</h2>
<p>Familiarize the student with:</p>
<ul>
<li>Type conversions</li>
<li>Conditional statements</li>
<li>Integer numbers</li>
<li>Floating-point numbers</li>
<li>Getting input from the user</li>
<li>Printing on screen</li>
</ul>


<h2>Scenario</h2>
<p>
Write a program that takes one floating-point number, converts it to an integer number, and then prints a description of the given number. Descriptions for numbers:</p>

<ul>
<li>numbers greater than or equal to 1 and less than 2 - <codel>Very bad</codel>.</li>
<li>numbers greater than or equal to 2 and less than 3 - <codel>Bad</codel>.</li>
<li>numbers greater than or equal to 3 and less than 4 - <codel>Neutral</codel>.</li>
<li>numbers greater than or equal to 4 and less than 5 - <codel>Good</codel>.</li>
<li>numbers greater than or equal to 5 and less than 6 - <codel>Very good</codel>.</li>
</ul>

<p>When a number is out of the given range (1&lt;=x&lt;6), the program should print nothing.</p>


<p>Your version of the program must print the same result as the expected output. </p>
